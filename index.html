// ---------------------------------------------------------------- iso helpers
function tileOrigin(t){ return {x:(t.c-t.r)*TW2, y:(t.c+t.r)*TH2}; }   // N (top) vertex
// point inside a tile's diamond, u,v in 0..1 (u→E edge, v→W edge)
function pt(t, u, v){
  const o = tileOrigin(t);
  return {x:o.x + (u-v)*TW2, y:o.y + (u+v)*TH2};
}
function diamondPath(x0, y0){
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0+TW2, y0+TH2);
  ctx.lineTo(x0, y0+TILE_H);
  ctx.lineTo(x0-TW2, y0+TH2);
  ctx.closePath();
}
function screenToTile(sx, sy){
  const wx = (sx - cam.x)/cam.zoom, wy = (sy - cam.y)/cam.zoom;
  const fx = wx/TW2, fy = wy/TH2;
  const c = Math.floor((fy+fx)/2), r = Math.floor((fy-fx)/2);
  return inGrid(c,r) ? idx(c,r) : -1;
}
function centerCamera(){
  fitZoom = Math.min((viewW-30)/(GRID*TILE_W+60), (viewH-170)/(GRID*TILE_H+120));
  fitZoom = Math.max(0.3, fitZoom);
  cam.zoom = Math.min(2.2, Math.max(fitZoom*0.95, 0.85));
  cam.x = viewW/2;
  cam.y = viewH/2 - GRID*TH2*cam.zoom + 14;
  clampCam();
}
function clampCam(){
  cam.zoom = Math.max(fitZoom*0.55, Math.min(2.4, cam.zoom));
  const minX=-GRID*TW2-60, maxX=GRID*TW2+60, minY=-90, maxY=GRID*TILE_H+120;
  let cx = (viewW/2 - cam.x)/cam.zoom, cy = (viewH/2 - cam.y)/cam.zoom;
  cx = Math.max(minX, Math.min(maxX, cx));
  cy = Math.max(minY, Math.min(maxY, cy));
  cam.x = viewW/2 - cx*cam.zoom;
  cam.y = viewH/2 - cy*cam.zoom;
}

// ---------------------------------------------------------------- colors
function soilColor(h){
  // cracked pale dust -> rich dark loam
  const t = Math.max(0, Math.min(1, (h-15)/55));
  return `rgb(${lerp(202,92,t)|0},${lerp(174,66,t)|0},${lerp(134,42,t)|0})`;
}
function heatColor(v){ return `hsl(${lerp(8,118,Math.max(0,Math.min(1,v/100)))},68%,50%)`; }
function waterColor(v){ return `hsl(${lerp(46,212,Math.max(0,Math.min(1,v/100)))},72%,55%)`; }
function tileBioScore(t){
  if(t.terrain==='trees') return 95;
  if(t.terrain==='pond') return 70;
  if(t.terrain==='wetland') return 92;
  if(t.terrain==='orchard' || t.terrain==='berrybush' || t.terrain==='beehive') return 82;
  if(t.terrain==='water') return 30 + state.waterQuality*0.5;
  if(t.terrain==='dead') return 3;
  if(t.terrain==='riverbed') return 8;
  if(t.terrain!=='soil') return 40;
  return Math.min(100, t.flowers*40 + t.soil.microbial*0.55 + (t.crop&&CROPS[t.crop.type].diverse?15:0) + (treeAdj(t)?14:0));
}
// how clean this tile's runoff is (for the Runoff overlay): buffers & living
// cover filter; bare dirt, monocrops and riverside grazing shed mud
function tileRunoffScore(t){
  if(t.terrain==='trees' || t.terrain==='orchard') return 92;
  if(t.terrain==='wetland') return 96;
  if(t.terrain==='pond') return 80;
  if(isWaterT(t)) return state.waterQuality;
  if(t.terrain==='dead') return 18;
  if(t.terrain==='riverbed') return 25;
  if(t.terrain!=='soil') return 70;
  let v = 15 + t.health*0.42 + t.soil.erosion*0.18;
  if(t.crop){ const c = CROPS[t.crop.type]; v += c.cover ? 25 : c.diverse ? 12 : -14; }
  else if(!t.graze && t.health<40) v -= 12;
  if(t.graze && waterAdj(t)) v -= 22;
  return clamp(v);
}
function runoffColor(v){
  // muddy brown → gray-teal → clear blue (skips green so "muddy" never reads as "fine")
  const q = Math.max(0, Math.min(1, v/100));
  const A = [124,92,52], B = [118,138,142], C = [58,158,214];
  const c = q<0.5 ? A.map((a,i)=>lerp(a,B[i],q*2)|0) : B.map((b,i)=>lerp(b,C[i],(q-0.5)*2)|0);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function overlayColor(t){
  if(overlay==='health') return heatColor(isLandT(t)? t.health : isWaterT(t)?85 : t.terrain==='riverbed'?12 : 80);
  if(overlay==='water')  return waterColor(isWetT(t)? 100 : isLandT(t)? t.soil.water : t.terrain==='riverbed'?8 : 60);
  if(overlay==='bio')    return heatColor(tileBioScore(t));
  if(overlay==='om')     return heatColor(isLandT(t)? t.soil.om : t.terrain==='riverbed'?10 : 60);
  if(overlay==='runoff') return runoffColor(tileRunoffScore(t));
  return null;
}

// ---------------------------------------------------------------- sky, time-of-day & horizon
function hex2rgb(h){
  if(h[0]==='#') return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const m = h.match(/(\d+),\s*(\d+),\s*(\d+)/);   // accept rgb(...) so mixes can chain
  return m ? [+m[1], +m[2], +m[3]] : [128,128,128];
}
function mixHex(a,b,t){
  const A = hex2rgb(a), B = hex2rgb(b);
  return `rgb(${lerp(A[0],B[0],t)|0},${lerp(A[1],B[1],t)|0},${lerp(A[2],B[2],t)|0})`;
}
// day-night curves from state.tod (0..1): sun crosses 0→0.6, night peaks ~0.8
function todInfo(){
  const T = state.tod;
  const dayT = T<0.6 ? T/0.6 : 0;                       // 0..1 across the daylight arc
  const sunEl = T<0.6 ? Math.sin(Math.PI*dayT) : 0;     // sun elevation
  const night = T<0.6 ? 0 : Math.sin(Math.PI*(T-0.6)/0.4);
  const dawnD = Math.min(Math.abs(T), Math.abs(T-1));
  const warm = Math.max(0, 1-Math.abs(T-0.57)/0.09) + Math.max(0, 1-dawnD/0.07);   // dusk & dawn glow
  return {T, dayT, sunEl, night:Math.max(0,Math.min(1,night)), warm:Math.max(0,Math.min(1,warm))};
}
function drawSky(t){
  const sn = SEASONS[state.season];
  const td = todInfo();
  let top = sn.sky0, bot = sn.sky1;
  if(td.warm>0){ top = mixHex(top, '#e88a4a', td.warm*0.55); bot = mixHex(bot, '#f7ce96', td.warm*0.6); }
  if(td.night>0){ top = mixHex(top, '#0b1130', td.night*0.92); bot = mixHex(bot, '#1c2a4e', td.night*0.88); }
  const g = ctx.createLinearGradient(0,0,0,viewH);
  g.addColorStop(0, top);
  g.addColorStop(1, bot);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,viewW,viewH);
  // stars & moon at night
  if(td.night>0.25){
    ctx.globalAlpha = (td.night-0.25)/0.75;
    ctx.fillStyle = '#f4f0dc';
    for(let i=0;i<34;i++){
      const x = sr(i*3+1)*viewW, y = sr(i*7+2)*viewH*0.55;
      const tw = 0.5 + Math.sin(t*1.5 + i)*0.5;
      ctx.beginPath(); ctx.arc(x, y, 0.8 + sr(i)*1.1*tw, 0, 6.29); ctx.fill();
    }
    // moon
    const mx = viewW*0.8, my = viewH*0.14, mr = Math.min(viewW,viewH)*0.035;
    ctx.fillStyle = '#f2ecd4';
    ctx.beginPath(); ctx.arc(mx,my,mr,0,6.29); ctx.fill();
    ctx.fillStyle = top;
    ctx.beginPath(); ctx.arc(mx-mr*0.42,my-mr*0.22,mr*0.82,0,6.29); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // the sun wheels across the sky with the time of day
  if(td.sunEl>0.02){
    const sx = viewW*(0.12 + td.dayT*0.76);
    const sy = viewH*(0.32 - td.sunEl*0.24);
    const r0 = Math.min(viewW,viewH)*0.05;
    ctx.globalAlpha = Math.min(1, td.sunEl*2.2);
    ctx.fillStyle = td.warm>0.3 ? '#ffb257' : state.season===3 ? '#f2f4f7' : '#ffd75e';
    ctx.beginPath(); ctx.arc(sx,sy,r0,0,6.29); ctx.fill();
    if(state.season<2 && td.night<0.1){
      ctx.strokeStyle = 'rgba(255,215,94,.55)'; ctx.lineWidth = 2.5;
      for(let i=0;i<8;i++){
        const a = t*0.15 + i*Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(sx+Math.cos(a)*r0*1.25, sy+Math.sin(a)*r0*1.25);
        ctx.lineTo(sx+Math.cos(a)*r0*1.6,  sy+Math.sin(a)*r0*1.6);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }
  // drifting clouds (dimmer at night)
  ctx.fillStyle = `rgba(255,255,255,${0.8 - td.night*0.62})`;
  for(let i=0;i<4;i++){
    const spd = 6 + sr(i*3)*6;
    const cx = ((t*spd + sr(i)*1400) % (viewW+220)) - 110;
    const cy = viewH*(0.05 + sr(i*7)*0.16);
    const s = viewH*(0.02 + sr(i*5)*0.02);
    ctx.beginPath();
    ctx.arc(cx,cy,s,0,6.29); ctx.arc(cx+s*1.1,cy+s*0.2,s*0.8,0,6.29); ctx.arc(cx-s,cy+s*0.25,s*0.7,0,6.29);
    ctx.fill();
  }
}
// rolling-hills panorama behind the plot so the valley sits IN a world.
// Anchored to the world-space horizon (just behind the grid's north corner),
// with a soft parallax on camera pan.
function drawHorizon(t){
  const img = SPRITES['bg_hills'];
  const td = todInfo();
  // world y=0 is the grid's north corner; place the horizon line there (screen space)
  const horizonY = cam.y + (-26)*cam.zoom;
  if(horizonY <= 0) return;
  if(img){
    // COVER-fit the panorama into the sky band [0..horizonY] so it fills cleanly
    // on ANY screen/aspect (no thin-sliver clipping, no side gaps). Bottom-anchored
    // to the horizon line, tiled horizontally so parallax never exposes an edge.
    const bandH = horizonY;
    // Cover-fit with ~40% extra width so we can drift for parallax WITHOUT ever
    // exposing an edge — then draw the panorama ONCE (no tiling → no seam, since
    // the painting isn't horizontally seamless).
    const scale = Math.max((viewW * 1.4) / img.width, bandH / img.height);
    const dw = img.width * scale, dh = img.height * scale;
    const iy = horizonY - dh;                              // painting's base sits on the horizon line
    const slack = (dw - viewW) / 2;                        // spare width on each side
    const drift = Math.max(-slack, Math.min(slack, -cam.x * 0.06));   // gentle, clamped parallax
    const px = (viewW - dw) / 2 + drift;                   // centered + drift, edges always off-screen
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, viewW, horizonY);
    ctx.clip();
    ctx.drawImage(img, px, iy, dw, dh);                    // single draw, no repeat
    // blend the panorama's top into our sky
    ctx.globalAlpha = 0.6;
    const skyG = ctx.createLinearGradient(0, iy, 0, iy+dh*0.3);
    const sn = SEASONS[state.season];
    skyG.addColorStop(0, sn.sky0); skyG.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = skyG;
    ctx.fillRect(0, 0, viewW, horizonY);
    ctx.globalAlpha = 1;
    // time-of-day & season wash over the distant hills
    if(state.season===3){ ctx.fillStyle = 'rgba(235,242,250,.42)'; ctx.fillRect(0,0,viewW,horizonY); }
    if(td.warm>0){ ctx.fillStyle = `rgba(240,150,70,${td.warm*0.22})`; ctx.fillRect(0,0,viewW,horizonY); }
    if(td.night>0){ ctx.fillStyle = `rgba(10,16,44,${td.night*0.6})`; ctx.fillRect(0,0,viewW,horizonY); }
    ctx.restore();
  }
  // below the horizon: dusty plain that greens as the valley heals
  const f = farmCache;
  const heal = f ? Math.max(0, Math.min(1, (f.avgHealth-15)/55)) : 0;
  let ground = mixHex(mixHex('#b3a077', '#6f9c55', heal), '#28304a', td.night*0.55);
  if(state.season===3) ground = mixHex('#dfe6ee', '#28304a', td.night*0.5);
  ctx.fillStyle = ground;
  ctx.fillRect(0, horizonY, viewW, viewH-horizonY);
  ctx.globalAlpha = 0.3;
  const gg = ctx.createLinearGradient(0,horizonY,0,viewH);
  gg.addColorStop(0,'rgba(255,255,255,.35)'); gg.addColorStop(1,'rgba(30,20,5,.25)');
  ctx.fillStyle = gg;
  ctx.fillRect(0, horizonY, viewW, viewH-horizonY);
  ctx.globalAlpha = 1;
}
function drawWeather(t){
  if(state.season===2){
    for(let i=0;i<14;i++){
      const x = fract(sr(i) + t*0.012*(0.5+sr(i*3))) * viewW;
      const y = ((t*(20+sr(i*7)*24) + sr(i*5)*900) % (viewH+30)) - 15;
      drawEmoji('🍂', x + Math.sin(t+i)*8, y, 11);
    }
  }
  if(state.season===3){
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    for(let i=0;i<30;i++){
      const x = fract(sr(i) + t*0.008*(0.5+sr(i*3))) * viewW + Math.sin(t*0.8+i)*6;
      const y = ((t*(16+sr(i*7)*20) + sr(i*5)*900) % (viewH+20)) - 10;
      ctx.beginPath(); ctx.arc(x, y, 1.6+sr(i*11)*1.4, 0, 6.29); ctx.fill();
    }
  }
}

// ---------------------------------------------------------------- ground pass
function drawGround(t, time){
  const o = tileOrigin(t);
  const seed = idx(t.c,t.r)*17+3;
  const ov = overlay!=='none' ? overlayColor(t) : null;
  const sn = SEASONS[state.season];
  // side faces (visible on south & east map edges; covered elsewhere by later tiles)
  const S = {x:o.x, y:o.y+TILE_H}, E = {x:o.x+TW2, y:o.y+TH2}, W = {x:o.x-TW2, y:o.y+TH2};
  ctx.fillStyle = ov ? 'rgba(60,44,26,1)' : '#5c4226';
  ctx.beginPath(); ctx.moveTo(W.x,W.y); ctx.lineTo(S.x,S.y); ctx.lineTo(S.x,S.y+TDEPTH); ctx.lineTo(W.x,W.y+TDEPTH); ctx.closePath(); ctx.fill();
  ctx.fillStyle = ov ? 'rgba(46,33,19,1)' : '#49341d';
  ctx.beginPath(); ctx.moveTo(S.x,S.y); ctx.lineTo(E.x,E.y); ctx.lineTo(E.x,E.y+TDEPTH); ctx.lineTo(S.x,S.y+TDEPTH); ctx.closePath(); ctx.fill();
  // DATA OVERLAY active: flat heatmap diamonds so the data always reads clearly
  // (illustrated art is skipped on purpose — heatmap > prettiness here)
  if(ov){
    diamondPath(o.x,o.y);
    ctx.fillStyle = ov; ctx.fill();
    ctx.strokeStyle = 'rgba(30,22,10,.22)'; ctx.lineWidth = 0.8;
    diamondPath(o.x,o.y); ctx.stroke();
    if(isWaterT(t)){   // keep water recognizable inside heatmaps
      ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.ellipse(o.x, o.y+TH2, 13, 6, 0, 0, 6.29); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(o.x, o.y+TH2, 6, 2.6, 0, 0, 6.29); ctx.stroke();
    }
    return;
  }
  // ---------- water (river + ponds), tinted by water quality ----------
  if(isWaterT(t)){
    const q = Math.max(0, Math.min(1, state.waterQuality/100));
    // RIVER TILESET: pick the illustrated piece from water-neighbor connectivity
    // (straights vs bends) so the waterway reads as one continuous stream.
    // Built ponds keep the self-contained pond art.
    let img = null;
    if(t.terrain==='pond'){
      img = SPRITES['tile_water'];
    }else{
      const wat = (c,r)=>{
        if(!inGrid(c,r)) return r<0 || r>=GRID;   // the river flows off-map north & south
        const nb = state.grid[idx(c,r)];
        return nb.terrain==='water';
      };
      const N = wat(t.c, t.r-1), S = wat(t.c, t.r+1), E = wat(t.c+1, t.r), W = wat(t.c-1, t.r);
      const n = (N?1:0)+(S?1:0)+(E?1:0)+(W?1:0);
      // Auto-tile the waterway from its water-neighbours. Bend sprites are named by
      // the two edges their water connects (ne = N+E, nw = N+W, se = S+E, sw = S+W);
      // straights connect N↔S or E↔W. Endpoints get a straight stub; 3+ way
      // junctions have no clean piece, so they fall back to procedural water.
      let nm = null;
      if(n===2){
        if(N&&S) nm = 'river_ns';
        else if(E&&W) nm = 'river_ew';
        else if(N&&E) nm = 'river_ne';
        else if(N&&W) nm = 'river_nw';
        else if(S&&E) nm = 'river_se';
        else if(S&&W) nm = 'river_sw';
      }else if(n===1){
        nm = (N||S) ? 'river_ns' : 'river_ew';
      }
      img = nm ? SPRITES[nm] : null;
    }
    if(img){
      // illustrated tile: TILE_W wide + natural depth below; top diamond aligned to grid
      const w = TILE_W+3, hh = w*img.height/img.width;
      ctx.drawImage(img, o.x-w/2, o.y-1.5, w, hh);
      // murky film clears as quality rises (dirty rivers still look dirty)
      if(q<0.85){
        ctx.globalAlpha = (0.85-q)*0.68;
        ctx.fillStyle = '#6e5b31';
        diamondPath(o.x,o.y); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }else{
      diamondPath(o.x,o.y);
      const wg = ctx.createLinearGradient(o.x-TW2,o.y,o.x+TW2,o.y+TILE_H);
      if(state.season===3){ wg.addColorStop(0,'#cfe4f2'); wg.addColorStop(1,'#a8cce2'); }
      else{
        // murky brown-green → clear blue
        wg.addColorStop(0, `rgb(${lerp(128,99,q)|0},${lerp(122,181,q)|0},${lerp(66,232,q)|0})`);
        wg.addColorStop(1, `rgb(${lerp(96,61,q)|0},${lerp(94,142,q)|0},${lerp(48,199,q)|0})`);
      }
      ctx.fillStyle = wg; ctx.fill();
      // sandy banks along edges that meet land — makes the river read as one band
      const EDGES = [
        [o.x,o.y,          o.x+TW2,o.y+TH2,  t.c,   t.r-1],
        [o.x+TW2,o.y+TH2,  o.x,o.y+TILE_H,   t.c+1, t.r  ],
        [o.x,o.y+TILE_H,   o.x-TW2,o.y+TH2,  t.c,   t.r+1],
        [o.x-TW2,o.y+TH2,  o.x,o.y,          t.c-1, t.r  ],
      ];
      ctx.lineWidth = 2.4; ctx.lineCap = 'round';
      ctx.strokeStyle = state.season===3 ? 'rgba(226,232,240,.9)' : 'rgba(211,186,136,.9)';
      EDGES.forEach(([ax,ay,bx,by,nc,nr])=>{
        if(inGrid(nc,nr) && isWaterT(state.grid[idx(nc,nr)])) return;
        ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
      });
      ctx.lineCap = 'butt';
    }
    // animated ripples (brighter on clean water)
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1.2;
    for(let k2=0;k2<2;k2++){
      const ph = fract(time*0.25 + k2*0.5 + seed*0.13);
      ctx.globalAlpha = (1-ph)*(0.2+q*0.45);
      ctx.beginPath();
      ctx.ellipse(o.x, o.y+TH2, 6+ph*22, 3+ph*11, 0, 0, 6.29);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    if(q>0.55){
      ctx.fillStyle = 'rgba(255,255,255,.7)';
      ctx.beginPath(); ctx.arc(o.x+Math.sin(time*1.3+seed)*12, o.y+TH2+Math.cos(time*1.1+seed)*5, 1.4, 0, 6.29); ctx.fill();
    }
    // the payoff: fish LEAP from clean water (with a splash)
    const jphase = Math.sin(time*0.9+seed*3);
    if(q>=0.7 && state.season!==3 && jphase>0.86){
      const jt = (jphase-0.86)/0.14;               // 0..1 across the leap window
      const arc = Math.sin(jt*Math.PI);            // up and back down
      const fx = o.x+Math.sin(seed)*10, fy = o.y+TH2-2-arc*9;
      drawSprite('fish', fx, fy+5, 13, spriteH('fish', 13, 11), ()=>drawEmoji('🐟', fx, fy, 10));
      if(jt<0.12 || jt>0.9){                       // splash at entry & exit
        ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(fx, o.y+TH2, 4+arc*3, 2, 0, 0, 6.29); ctx.stroke();
      }
    }
    if(state.season===3){
      ctx.globalAlpha = 0.3; ctx.fillStyle = '#e8f0f8';
      diamondPath(o.x,o.y); ctx.fill(); ctx.globalAlpha = 1;
    }
    return;
  }
  // ---------- land / trees / building ground ----------
  // HEALTH-DRIVEN TILE ART — the land heals visibly through the tiers:
  //   dead → cracked dirt (<45) → rich worked soil (45–70) → lush grass (>70)
  //   plus degraded features (salt pan, gullies, dry creekbed) and living
  //   variants (wildflower meadows, grazed pasture, paths)
  let gname;
  if(t.terrain==='riverbed'){
    gname = 'tile_riverbed';
  }else if(t.terrain==='dead'){
    gname = t.feature==='saltflat' ? 'tile_saltflat'
          : t.feature==='gully'    ? 'tile_gully'
          : t.feature==='swale'    ? 'tile_swale'
          : 'tile_dead';
  }else if(t.terrain==='soil'){
    if(t.feature==='path') gname = 'tile_path';
    else if(t.graze && t.health>=45) gname = 'tile_pasture';
    else if(t.health<45) gname = 'tile_dirt';
    else if(t.health<=70) gname = 'tile_soil';
    else gname = (t.flowers>0.6 && sr(seed*3)>0.5) ? 'tile_wildflower' : 'tile_grass';
  }else{
    gname = 'tile_grass';   // green pad under trees & buildings
  }
  const gimg = SPRITES[gname];
  if(gimg){
    const w = TILE_W+3, ar = gimg.height/gimg.width, hh = w*ar;
    // Anchor every ground tile's BASE to a common baseline (reference aspect .60)
    // so a tile whose art rises ABOVE the diamond (e.g. tile_wildflower, ~.95)
    // grows UPWARD instead of shoving its footprint down and tearing a grid gap.
    // Normal ~.60 tiles are unaffected (offset ≈ 0).
    const iy = o.y - 1.5 + (0.60 - ar)*w;
    ctx.drawImage(gimg, o.x-w/2, iy, w, hh);
    if(t.terrain==='dead' && !t.feature){
      // an ashen pall over truly dead ground — lifts the moment it revives
      ctx.globalAlpha = 0.26;
      ctx.fillStyle = '#8c8578';
      diamondPath(o.x,o.y); ctx.fill();
      ctx.globalAlpha = 1;
    }
    if(state.season===3){   // winter snow veil
      ctx.globalAlpha = 0.45; ctx.fillStyle = '#eef4fb';
      diamondPath(o.x,o.y); ctx.fill(); ctx.globalAlpha = 1;
    }
    return;
  }
  // procedural fallback (unchanged look from v3)
  (()=>{
    diamondPath(o.x,o.y);
    const h = t.terrain==='soil' ? t.health : 72;
    ctx.fillStyle = soilColor(h);
    ctx.fill();
    // grass overlay as it heals (cracked dirt -> lush green)
    const grassA = Math.max(0, Math.min(1, (h-42)/42));
    if(grassA>0){
      ctx.globalAlpha = grassA*0.85;
      ctx.fillStyle = sn.grass;
      diamondPath(o.x,o.y); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // cracks on sad soil
    if(t.terrain==='soil' && h<46){
      ctx.strokeStyle = `rgba(90,64,40,${(46-h)/46*0.6})`;
      ctx.lineWidth = 1;
      for(let cn=0;cn<4;cn++){
        let p0 = pt(t, 0.2+sr(seed+cn*5)*0.6, 0.2+sr(seed+cn*9)*0.6);
        ctx.beginPath(); ctx.moveTo(p0.x,p0.y);
        for(let s2=0;s2<2;s2++){
          p0 = {x:p0.x+(sr(seed+cn*3+s2)-0.5)*14, y:p0.y+(sr(seed+cn*7+s2)-0.3)*7};
          ctx.lineTo(p0.x,p0.y);
        }
        ctx.stroke();
      }
    }
    // grass tufts on healthy soil
    if(t.terrain==='soil'){
      const tufts = Math.max(0, Math.min(1,(h-48)/52)) * 7 | 0;
      ctx.strokeStyle = state.season===3 ? '#9fb49b' : '#3f7a38';
      ctx.lineWidth = 1.1;
      for(let g2=0; g2<tufts; g2++){
        const gp = pt(t, 0.15+sr(seed+g2*13)*0.7, 0.15+sr(seed+g2*29)*0.7);
        const sway = Math.sin(time*1.6+seed+g2)*1.3;
        ctx.beginPath();
        ctx.moveTo(gp.x,gp.y); ctx.lineTo(gp.x-2+sway, gp.y-4);
        ctx.moveTo(gp.x,gp.y); ctx.lineTo(gp.x+sway, gp.y-5);
        ctx.moveTo(gp.x,gp.y); ctx.lineTo(gp.x+2+sway, gp.y-3.5);
        ctx.stroke();
      }
    }
    // winter snow veil
    if(state.season===3){
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#eef4fb';
      diamondPath(o.x,o.y); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // faint grid line
    ctx.strokeStyle = 'rgba(60,42,22,.18)'; ctx.lineWidth = 0.8;
    diamondPath(o.x,o.y); ctx.stroke();
  })();
}
function drawHighlight(i, time, color){
  const t = state.grid[i];
  const o = tileOrigin(t);
  diamondPath(o.x, o.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5 + Math.sin(time*5)*0.8;
  ctx.stroke();
  ctx.globalAlpha = 0.14;
  ctx.fillStyle = color;
  diamondPath(o.x,o.y); ctx.fill();
  ctx.globalAlpha = 1;
}

// ---------------------------------------------------------------- object pass
function drawCropObj(t, time, seed){
  const c = t.crop, def = CROPS[c.type];
  const g = Math.min(1, c.growth);
  const base = pt(t, 0.5, 0.5);
  // illustrated crops: young plants show the sprout sprite, then the full crop
  // scales up with growth, standing on the tile (bottom just above the S vertex)
  const CROP_ART = {
    sisters:  {w:46, yo:13},   // tall bundle — corn/beans/squash
    wheat:    {w:60, yo:14},   // wide golden bed
    clover:   {w:56, yo:12},   // low flowering patch
    covercrop:{w:56, yo:12},   // scrappy pioneer tangle
  };
  const ca = CROP_ART[c.type] || {w:46, yo:12};
  let sprName = 'crop_'+c.type;
  if(g<0.35 && SPRITES['crop_sprout']) sprName = 'crop_sprout';
  else if(c.type==='sisters' && g<0.72 && SPRITES['crop_corn']) sprName = 'crop_corn';   // corn shoots first
  const scl = sprName==='crop_sprout' ? (0.45+g*1.1) : (0.62+0.38*g);
  const sw = (sprName==='crop_sprout' ? 30 : sprName==='crop_corn' ? 40 : ca.w) * scl;
  const sh = spriteH(sprName, sw, 30+g*26);
  drawSprite(sprName, base.x, base.y+ca.yo, sw, sh, ()=>{
    if(c.type==='sisters'){
      for(let s=0;s<3;s++){
        const bp = pt(t, 0.3+s*0.2, 0.62-s*0.14);
        const x = bp.x + Math.sin(time*1.4+seed*6+s)*1.6*g;
        const hgt = 34*g;
        if(hgt<3) { ctx.fillStyle='#4d7c3a'; ctx.beginPath(); ctx.arc(bp.x,bp.y,1.6,0,6.29); ctx.fill(); continue; }
        ctx.strokeStyle = '#3e7c3a'; ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(bp.x, bp.y); ctx.lineTo(x, bp.y-hgt); ctx.stroke();
        ctx.lineWidth = 1.1;
        for(let L=1; L<=2; L++){
          const ly = bp.y - hgt*L/3;
          ctx.beginPath(); ctx.moveTo(x, ly);
          ctx.quadraticCurveTo(x+(L%2?7:-7), ly-3, x+(L%2?11:-11), ly-1);
          ctx.stroke();
        }
        if(g>0.7) drawEmoji('🌽', x, bp.y-hgt-5, 11);
        if(g>0.4){
          ctx.fillStyle = '#7db35b';
          for(let b=0;b<3;b++){
            ctx.beginPath(); ctx.arc(x+Math.sin(b*2.5+seed)*3, bp.y-hgt*(0.25+b*0.22), 1.6, 0, 6.29); ctx.fill();
          }
        }
      }
      if(g>0.3){
        for(let s=0;s<2;s++){
          const sp = pt(t, 0.42+s*0.2, 0.72);
          const r = 4.5*g;
          ctx.fillStyle = '#5e8f45';
          ctx.beginPath(); ctx.arc(sp.x-3, sp.y-2, r*1.15, 0, 6.29); ctx.fill();
          ctx.fillStyle = '#e8a33d';
          ctx.beginPath(); ctx.arc(sp.x, sp.y, r, 0, 6.29); ctx.fill();
        }
      }
    }else if(c.type==='wheat'){
      const col = g<0.6 ? '#7da85b' : '#d9b44a';
      for(let s=0;s<9;s++){
        const bp = pt(t, 0.18+sr(seed+s*3)*0.64, 0.18+sr(seed+s*7)*0.64);
        const x = bp.x + Math.sin(time*1.8+seed*4+s)*1.4*g;
        const hgt = 20*g;
        if(hgt<2) continue;
        ctx.strokeStyle = col; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(bp.x, bp.y); ctx.lineTo(x, bp.y-hgt); ctx.stroke();
        if(g>0.6){
          ctx.fillStyle = '#e6c463';
          ctx.beginPath(); ctx.ellipse(x, bp.y-hgt-2, 1.7, 3.8, 0, 0, 6.29); ctx.fill();
        }
      }
    }else if(c.type==='clover' || c.type==='covercrop'){
      const n = Math.max(2, (g*12)|0);
      for(let s=0;s<n;s++){
        const cp = pt(t, 0.15+sr(seed+s*3)*0.7, 0.15+sr(seed+s*7)*0.7);
        ctx.fillStyle = c.type==='covercrop' ? '#7a9448' : '#4d9448';
        ctx.beginPath(); ctx.arc(cp.x, cp.y-1, 2.3+sr(s)*1.4, 0, 6.29); ctx.fill();
        if(g>0.6 && sr(seed+s*11)>0.55){
          ctx.fillStyle = '#fef6ee';
          ctx.beginPath(); ctx.arc(cp.x+2, cp.y-4, 1.4, 0, 6.29); ctx.fill();
        }
      }
    }
  });
  // kid-readable growth bar
  const o = tileOrigin(t);
  const bx = o.x-14, by = o.y+TILE_H-6, bw = 28;
  ctx.fillStyle = 'rgba(30,22,10,.45)';
  ctx.fillRect(bx, by, bw, 4);
  ctx.fillStyle = g>=0.99 ? '#8fe06e' : '#ffd45e';
  ctx.fillRect(bx, by, Math.max(2, bw*g), 4);
}
function drawTreesObj(t, time, seed){
  const base = pt(t, 0.5, 0.5);
  // riverside plantings read as flowering hedgerows (riparian buffers);
  // inland ones as a single big tree — both stand ON the tile
  const useHedge = SPRITES['hedgerow'] && waterAdj(t);
  const nm = useHedge ? 'hedgerow' : 'tile_trees_obj';
  const tw = useHedge ? 64 : 52;
  const th = spriteH(nm, tw, 52);
  const ty = useHedge ? base.y+15 : base.y+13;
  drawSprite(nm, base.x, ty, tw, th, ()=>{
    const cols = state.season===2 ? ['#c77b2e','#a8642a'] : state.season===3 ? ['#7d8f86','#6c7d75'] : ['#3f7d3a','#356b31'];
    [[0.36,0.4,1],[0.66,0.62,0.85],[0.5,0.75,0.7]].forEach(([u,v,s],k)=>{
      const b = pt(t,u,v);
      const sway = Math.sin(time*0.9+seed+k)*1.2;
      ctx.fillStyle = '#6b4a2a';
      ctx.fillRect(b.x-1.6*s, b.y-14*s, 3.2*s, 14*s);
      if(state.season===3){
        ctx.strokeStyle = '#8a97a2'; ctx.lineWidth = 1.4*s;
        for(let br=0;br<3;br++){
          ctx.beginPath(); ctx.moveTo(b.x, b.y-12*s);
          ctx.lineTo(b.x+(br-1)*6*s+sway, b.y-20*s);
          ctx.stroke();
        }
        ctx.fillStyle = 'rgba(240,246,252,.9)';
        ctx.beginPath(); ctx.arc(b.x+sway, b.y-16*s, 5*s, 0, 6.29); ctx.fill();
      }else{
        ctx.fillStyle = cols[k%2];
        ctx.beginPath();
        ctx.arc(b.x+sway, b.y-18*s, 8.5*s, 0, 6.29);
        ctx.arc(b.x-5*s+sway, b.y-13*s, 6*s, 0, 6.29);
        ctx.arc(b.x+5*s+sway, b.y-13*s, 6*s, 0, 6.29);
        ctx.fill();
        if(state.season===0 && sr(seed+k)>0.4){
          ctx.fillStyle = '#f7c8dd';
          ctx.beginPath(); ctx.arc(b.x+3*s+sway, b.y-20*s, 1.8*s, 0, 6.29); ctx.fill();
        }
      }
    });
  });
}
function drawBuilding(t, time){
  const o = tileOrigin(t);
  const S = {x:o.x, y:o.y+TILE_H}, E = {x:o.x+TW2, y:o.y+TH2}, W = {x:o.x-TW2, y:o.y+TH2}, N = {x:o.x, y:o.y};
  const barn = t.terrain==='barn';
  const H = barn ? 30 : 17;
  const wallL = barn ? '#9e3c30' : '#8a6b42';
  const wallR = barn ? '#b8493a' : '#a07d4e';
  const roof = barn ? '#75342a' : '#6e5433';
  const bw = barn ? 82 : 62;
  drawSprite(t.terrain, S.x, S.y+3, bw, spriteH(t.terrain, bw, H+TILE_H), ()=>{
    // grass pad
    diamondPath(o.x,o.y);
    ctx.fillStyle = state.season===3 ? '#dfe6ee' : '#7aa85f';
    ctx.fill();
    // walls
    ctx.fillStyle = wallL;
    ctx.beginPath(); ctx.moveTo(W.x,W.y); ctx.lineTo(S.x,S.y); ctx.lineTo(S.x,S.y-H); ctx.lineTo(W.x,W.y-H); ctx.closePath(); ctx.fill();
    ctx.fillStyle = wallR;
    ctx.beginPath(); ctx.moveTo(S.x,S.y); ctx.lineTo(E.x,E.y); ctx.lineTo(E.x,E.y-H); ctx.lineTo(S.x,S.y-H); ctx.closePath(); ctx.fill();
    // roof (raised top diamond)
    ctx.fillStyle = roof;
    ctx.beginPath();
    ctx.moveTo(N.x, N.y-H-8); ctx.lineTo(E.x, E.y-H); ctx.lineTo(S.x, S.y-H); ctx.lineTo(W.x, W.y-H);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 1;
    ctx.stroke();

// ---------------------------------------------------------------- agents & wildlife
function updateAgents(simDt){
  agents.forEach(a=>{
    const du = a.tu-a.u, dv = a.tv-a.v;
    const d = Math.hypot(du,dv);
    if(d < 0.03){
      a.tu = 0.15+Math.random()*0.7;
      a.tv = 0.15+Math.random()*0.7;
    }else if(simDt>0){
      a.u += du/d * a.speed * simDt;
      a.v += dv/d * a.speed * simDt;
    }
  });
}
function flowerTargets(){
  const list = [];
  state.grid.forEach((t,i)=>{ if(t.terrain==='trees' || (t.terrain==='soil' && (t.flowers>0.2 || t.health>62))) list.push(i); });
  return list.length ? list : [idx(GRID>>1,GRID>>1)];
}
function countKind(k){ let n=0; for(const w of wildlife) if(w.kind===k) n++; return n; }
function dropKind(k){ const j = wildlife.findIndex(w=>w.kind===k); if(j>=0) wildlife.splice(j,1); }
function updateWildlife(dt, bio){
  // desired counts scale with biodiversity & water quality (capped, lightweight)
  const wq = state.waterQuality;
  const wTiles = waterTileIdx();
  const pondTiles = [];
  const lushTiles = [];
  state.grid.forEach((t,i)=>{
    if(t.terrain==='pond' || t.terrain==='wetland') pondTiles.push(i);
    if(t.terrain==='soil' && t.health>70) lushTiles.push(i);
  });
  const targets = flowerTargets();
  const wants = {
    bee:       bio>=30 ? Math.min(6, 2+(((bio-30)/10)|0)) : 0,
    butterfly: bio>=45 ? Math.min(5, 1+(((bio-45)/10)|0)) : 0,
    duck:      (wq>=70 && wTiles.length) ? (wq>=88?3:2) : 0,
    heron:     (wq>=85 && wTiles.length) ? 1 : 0,
    dragonfly: (pondTiles.length && bio>=25) ? Math.min(3, 1+(bio/30|0)) : 0,
    frog:      (pondTiles.length && bio>=38) ? Math.min(2, pondTiles.length) : 0,
    rabbit:    (lushTiles.length>=8 && bio>=50) ? 2 : lushTiles.length>=4&&bio>=50 ? 1 : 0,
  };
  const anchorFor = (kind)=>{
    let list = targets;
    if(kind==='duck' || kind==='heron') list = wTiles.length?wTiles:targets;
    else if(kind==='dragonfly' || kind==='frog') list = pondTiles.length?pondTiles:targets;
    else if(kind==='rabbit') list = lushTiles.length?lushTiles:targets;
    return tileWorld(list[(Math.random()*list.length)|0]);
  };
  const SPD = {bee:34, butterfly:22, duck:11, heron:7, dragonfly:46, frog:9, rabbit:16};
  Object.entries(wants).forEach(([kind, want])=>{
    const have = countKind(kind);
    if(have<want && Math.random()<dt*0.5){
      const p = anchorFor(kind);
      wildlife.push({kind, x:p.x+(Math.random()-0.5)*26, y:p.y-(kind==='duck'||kind==='frog'?4:14)-Math.random()*8,
        tx:p.x, ty:p.y-8, sp:SPD[kind]||20, ph:Math.random()*6.28, retarget:0});
    }
    if(have>want) dropKind(kind);
  });
  wildlife.forEach(w=>{
    w.retarget -= dt;
    if(w.retarget<=0){
      const p = anchorFor(w.kind);
      if(w.kind==='duck' || w.kind==='heron' || w.kind==='frog'){
        w.tx = p.x+(Math.random()-0.5)*22;
        w.ty = p.y-3-Math.random()*4;
        w.retarget = 3.5+Math.random()*4;
      }else if(w.kind==='rabbit'){
        w.tx = p.x+(Math.random()-0.5)*30;
        w.ty = p.y-4;
        w.retarget = 2+Math.random()*3;
      }else{
        w.tx = p.x+(Math.random()-0.5)*36;
        w.ty = p.y-12-Math.random()*20;
        w.retarget = w.kind==='dragonfly' ? 1.2+Math.random()*1.5 : 2.5+Math.random()*3;
      }
    }
    const dx = w.tx-w.x, dy = w.ty-w.y, d = Math.hypot(dx,dy);
    if(d>2){ w.x += dx/d*w.sp*dt; w.y += dy/d*w.sp*dt; }
    w.ph += dt*4;
  });
  // birds: screen-space fliers across the sky
  const wantBirds = bio>=60 ? Math.min(4, 1+(((bio-60)/14)|0)) : 0;
  while(birds.length<wantBirds) birds.push({x:-40-Math.random()*200, y:0.06+Math.random()*0.16, sp:26+Math.random()*20, ph:Math.random()*6.28});
  if(birds.length>wantBirds) birds.pop();
  birds.forEach(b=>{
    b.x += b.sp*dt;
    if(b.x > viewW+50){ b.x = -50-Math.random()*150; b.y = 0.06+Math.random()*0.16; }
  });
}

let deadAnchors = [], lushAnchors = [], anchorT = 99;
function refreshAnchors(){
  deadAnchors = []; lushAnchors = [];
  state.grid.forEach((t,i)=>{
    if(t.terrain==='dead' || t.terrain==='riverbed'){ if(sr(i*3)>0.5) deadAnchors.push(tileWorld(i)); }
    else if(t.terrain==='soil' && t.health>70){ if(sr(i*5)>0.35) lushAnchors.push(tileWorld(i)); }
    else if((t.terrain==='trees' || t.terrain==='wetland') && sr(i*7)>0.4) lushAnchors.push(tileWorld(i));
  });

function drawAmbient(time){
  const td = todInfo();
  // dust motes drifting over the dead ground
  if(deadAnchors.length && state.season!==3 && td.night<0.5){
    ctx.fillStyle = 'rgb(214,190,140)';
    const n = Math.min(26, deadAnchors.length*2);
    for(let k=0;k<n;k++){
      const a = deadAnchors[k % deadAnchors.length];
      const ph = fract(time*0.07*(0.6+sr(k*3)) + sr(k*7));
      const x = a.x - 30 + ph*70 + Math.sin(time*0.9+k)*6;
      const y = a.y - 4 - Math.sin(ph*Math.PI)*14 - sr(k*5)*8;
      ctx.globalAlpha = Math.sin(ph*Math.PI)*(0.3+sr(k)*0.25)*(1-td.night);
      ctx.beginPath(); ctx.arc(x, y, 1+sr(k*11)*1.3, 0, 6.29); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // pollen & petals sparkling over thriving land
  if(lushAnchors.length && state.season!==3 && td.night<0.4){
    const n = Math.min(20, lushAnchors.length*2);
    for(let k=0;k<n;k++){
      const a = lushAnchors[k % lushAnchors.length];
      const ph = fract(time*0.05*(0.5+sr(k*13)) + sr(k*17));
      const x = a.x + Math.sin(time*0.6+k*2)*18;
      const y = a.y - 6 - ph*26;
      ctx.globalAlpha = Math.sin(ph*Math.PI)*0.55*(1-td.night*2);
      ctx.fillStyle = k%3===0 ? '#ffd9e8' : '#fff7c8';
      ctx.beginPath(); ctx.arc(x, y, 1.1+sr(k*19), 0, 6.29); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // fireflies rise at night over the living land
  if(lushAnchors.length && td.night>0.45 && state.season!==3){
    const n = Math.min(16, lushAnchors.length*2);
    for(let k=0;k<n;k++){
      const a = lushAnchors[k % lushAnchors.length];
      const x = a.x + Math.sin(time*0.5+k*2.3)*22 + Math.sin(time*1.3+k)*6;
      const y = a.y - 10 - Math.sin(time*0.4+k*1.7)*8;
      const gl = 0.4+0.6*Math.abs(Math.sin(time*1.8+k*2.9));
      ctx.globalAlpha = (td.night-0.45)/0.55 * gl;
      ctx.fillStyle = '#fff2a0';
      ctx.shadowColor = '#ffe36e'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(x, y, 1.5, 0, 6.29); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }
}

// ---------------------------------------------------------------- render
// cull tiles outside the viewport (the 14x14 world can be zoomed way in)
function tileVisible(t){
  const z = cam.zoom;
  const sx = (t.c-t.r)*TW2*z + cam.x;
  const sy = (t.c+t.r)*TH2*z + cam.y;
  return sx > -120*z && sx < viewW+120*z && sy > -140*z && sy < viewH+90*z;
}
function render(time){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawSky(time);
  drawHorizon(time);
  // world pass
  ctx.setTransform(DPR*cam.zoom, 0, 0, DPR*cam.zoom, DPR*cam.x, DPR*cam.y);
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    const t = state.grid[idx(c,r)];
    if(tileVisible(t)) drawGround(t, time);
  }
  if(hovered>=0 && hovered!==selected) drawHighlight(hovered, time, tool==='select' ? '#ffffff' : '#ffe270');
  if(selected>=0) drawHighlight(selected, time, '#ffd45e');
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    const t = state.grid[idx(c,r)];
    if(tileVisible(t)) drawTileObjects(t, idx(c,r), time);
  }
  drawWildlifeWorld(time);
  drawAmbient(time);
  drawParts(worldParts);
  // screen pass
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // time-of-day lighting wash (dusk glow, night blue)
  const td = todInfo();
  if(td.warm>0){ ctx.fillStyle = `rgba(255,150,60,${(td.warm*0.10).toFixed(3)})`; ctx.fillRect(0,0,viewW,viewH); }
  if(td.night>0){ ctx.fillStyle = `rgba(13,20,52,${(td.night*0.32).toFixed(3)})`; ctx.fillRect(0,0,viewW,viewH); }
  drawBirdsScreen(time);
  drawWeather(time);
  drawParts(screenParts);
  if(state.paused || modalOpen || journeyOpen){
    ctx.fillStyle = 'rgba(20,16,8,.14)';
    ctx.fillRect(0,0,viewW,viewH);
  }
}

// ---------------------------------------------------------------- main loop
let hudT = 0;
function frame(now){
  const dt = Math.min(0.1, (now-lastT)/1000 || 0.016);
  lastT = now;
  farmCache = farmStats();
  const simDt = (state.paused || modalOpen || journeyOpen) ? 0 : dt*state.speed;
  if(simDt>0) simStep(simDt);
  updateAgents(simDt);
  updateWildlife(dt, farmCache.bio);
  anchorT += dt;
  if(anchorT > 4){ anchorT = 0; refreshAnchors(); }   // ambient dust/pollen/firefly anchors
  updateParts(worldParts, dt);
  updateParts(screenParts, dt);
  render(now/1000);
  hudT += dt;
  if(hudT > 0.3){ hudT = 0; updateHUD(); if(document.getElementById('infoPanel').classList.contains('show') && selected>=0) openInfo(true); }
  requestAnimationFrame(frame);
}

// ---------------------------------------------------------------- input
const pointers = new Map();
let panState = null, pinchState = null, downInfo = null, paintSet = null;

function evPos(e){
  const rect = canvas.getBoundingClientRect();
  return {x:e.clientX-rect.left, y:e.clientY-rect.top};
}
function startPan(p){ panState = {x:p.x, y:p.y, camX:cam.x, camY:cam.y}; }
function tryPaint(p){
  const i = screenToTile(p.x, p.y);
  if(i<0 || !paintSet || paintSet.has(i)) return;
  paintSet.add(i);
  applyTool(i);
}
function onPointerDown(e){
  if(e.target!==canvas) return;
  ensureAudio();
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
  const p = evPos(e);
  pointers.set(e.pointerId, p);
  if(pointers.size===2){
    // two fingers: always pan+pinch, cancel painting
    downInfo = null; paintSet = null; panState = null;
    const pts = [...pointers.values()];
    pinchState = {
      d0: Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y) || 1,
      zoom0: cam.zoom,
      mx:(pts[0].x+pts[1].x)/2, my:(pts[0].y+pts[1].y)/2,
      camX:cam.x, camY:cam.y,
    };
    return;
  }
  if(pointers.size>2) return;
  downInfo = {x:p.x, y:p.y, moved:false, button:e.button};
  const td = toolDef(tool);
  if(e.button===1 || e.button===2 || tool==='select'){
    startPan(p);
  }else if(td && td.paint){
    paintSet = new Set();
    tryPaint(p);
  }
  // non-paint build tools (pond) apply on clean click at pointerup
}
function onPointerMove(e){
  const p = evPos(e);
  if(pointers.has(e.pointerId)) pointers.set(e.pointerId, p);
  if(e.target===canvas || pointers.has(e.pointerId)) hovered = screenToTile(p.x, p.y);
  if(pinchState && pointers.size>=2){
    const pts = [...pointers.values()];
    const d = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y) || 1;
    const mx = (pts[0].x+pts[1].x)/2, my = (pts[0].y+pts[1].y)/2;
    const wx = (pinchState.mx - pinchState.camX)/pinchState.zoom0;
    const wy = (pinchState.my - pinchState.camY)/pinchState.zoom0;
    cam.zoom = pinchState.zoom0 * d/pinchState.d0;
    cam.zoom = Math.max(fitZoom*0.55, Math.min(2.4, cam.zoom));
    cam.x = mx - wx*cam.zoom;
    cam.y = my - wy*cam.zoom;
    clampCam();
    return;
  }
  if(!pointers.has(e.pointerId)) return;
  if(downInfo && Math.hypot(p.x-downInfo.x, p.y-downInfo.y)>6) downInfo.moved = true;
  if(panState){
    cam.x = panState.camX + (p.x-panState.x);
    cam.y = panState.camY + (p.y-panState.y);
    clampCam();
  }else if(paintSet){
    tryPaint(p);
  }
}
function onPointerUp(e){
  const p = evPos(e);
  const wasDown = pointers.has(e.pointerId);
  pointers.delete(e.pointerId);
  if(!wasDown) return;
  if(e.pointerType!=='mouse') hovered = -1;
  if(pointers.size<2) pinchState = null;
  if(pointers.size===1){
    // one finger remains: resume panning from it
    startPan([...pointers.values()][0]);
    downInfo = null; paintSet = null;
    return;
  }
  const clicked = downInfo && !downInfo.moved && downInfo.button!==1 && downInfo.button!==2;
  if(clicked){
    const i = screenToTile(p.x, p.y);
    const td = toolDef(tool);
    if(tool==='select'){
      if(i>=0) applyTool(i);
      else { selected = -1; closeInfo(); }
    }else if(td && !td.paint && i>=0){
      applyTool(i);
    }
  }
  panState = null; paintSet = null; downInfo = null;
}
function onWheel(e){
  e.preventDefault();
  const p = evPos(e);
  const wx = (p.x - cam.x)/cam.zoom, wy = (p.y - cam.y)/cam.zoom;
  cam.zoom *= (e.deltaY<0 ? 1.12 : 0.89);
  cam.zoom = Math.max(fitZoom*0.55, Math.min(2.4, cam.zoom));
  cam.x = p.x - wx*cam.zoom;
  cam.y = p.y - wy*cam.zoom;
  clampCam();
}

// ---------------------------------------------------------------- UI
let lastToastMsg = '', lastToastT = 0;
function toast(msg){
  // throttle identical messages (paint-drag can fire many at once)
  const now = performance.now();
  if(msg===lastToastMsg && now-lastToastT<1200) return;
  lastToastMsg = msg; lastToastT = now;
  const box = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  box.appendChild(el);
  while(box.children.length>3) box.removeChild(box.firstChild);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 3700);
}

function toolCost(td){

  if((td.id==='sisters'||td.id==='wheat'||td.id==='clover'||td.id==='covercrop') && state.unlocks.upg_seeds) return Math.max(1, td.cost-1);

// ---------------------------------------------------------------- save/load
// v6 bundle: { v:6, camp:{cur,unlocked,stars,done}, state:<in-progress level> }
// Anything else (including old rootweave_v5 saves under their own key, or
// corrupted data) simply starts the campaign fresh — it must never crash.
function save(){
  try{
    state.sound = soundOn;
    localStorage.setItem(SAVE_KEY, JSON.stringify({v:6, camp:camp, state:state}));
  }catch(e){}
}
function loadBundle(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const d = JSON.parse(raw);
    if(!d || typeof d!=='object' || d.v!==6) return null;
    return d;
  }catch(e){ return null; }
}
function loadCamp(d){
  camp = {cur:0, unlocked:0, stars:LEVELS.map(()=>0), done:LEVELS.map(()=>false)};
  if(!d || !d.camp || typeof d.camp!=='object') return;
  const c = d.camp;
  if(Array.isArray(c.done)) camp.done = LEVELS.map((_,i)=>!!c.done[i]);
  if(Array.isArray(c.stars)) camp.stars = LEVELS.map((_,i)=>Math.max(0, Math.min(3, (+c.stars[i]||0)|0)));
  camp.unlocked = (typeof c.unlocked==='number' && !isNaN(c.unlocked)) ? Math.max(0, Math.min(LEVELS.length-1, c.unlocked|0)) : 0;
  camp.done.forEach((dn,i)=>{ if(dn && i+1<LEVELS.length) camp.unlocked = Math.max(camp.unlocked, i+1); });
  camp.cur = (typeof c.cur==='number' && !isNaN(c.cur)) ? Math.max(0, Math.min(camp.unlocked, c.cur|0)) : 0;
}
function loadLevelState(d){
  try{
    if(!d || !d.state || typeof d.state!=='object') return false;
    const st = d.state;
    const lv = (typeof st.lv==='number' && st.lv>=0 && st.lv<LEVELS.length) ? st.lv|0 : -1;
    if(lv<0 || lv>camp.unlocked) return false;
    if(!Array.isArray(st.grid) || st.grid.length!==LEVELS[lv].grid*LEVELS[lv].grid) return false;
    const fresh = newGame(lv);              // also sets GRID for this level
    state = Object.assign(fresh, st);
    state.v = 6; state.lv = lv; state.gridSize = GRID;
    state.stats = Object.assign({}, DEFAULT_STATS, st.stats||{});
    // defensive: every field added after launch must never crash an older save
    if(typeof state.waterQuality!=='number' || isNaN(state.waterQuality)) state.waterQuality = LEVELS[lv].river?30:55;
    state.waterQuality = clamp(state.waterQuality);
    if(typeof state.tod!=='number' || isNaN(state.tod)) state.tod = 0.3;
    state.tod = ((state.tod%1)+1)%1;
    if(typeof state.regionIdx!=='number' || isNaN(state.regionIdx) || state.regionIdx<0) state.regionIdx = 0;
    state.regionIdx = Math.min(REGIONS.length, state.regionIdx|0);
    if(!Array.isArray(state.tasks)) state.tasks = [];
    state.tasks = state.tasks.filter(x=>x && taskDef(x.id));
    if(!state.tasksDone || typeof state.tasksDone!=='object') state.tasksDone = {};
    if(!state.unlocks || typeof state.unlocks!=='object') state.unlocks = {};
    ['washRestored','riparianTip','incomeTip','deadTip','deadTip2','levelDone','introSeen','paused','won','tutDone']
      .forEach(k=>{ if(typeof state[k]!=='boolean') state[k] = false; });
    state.tutStep = Math.max(0, Math.min((LEVELS[lv].tut||[]).length, (state.tutStep|0)||0));
    if(typeof state.speed!=='number' || !(state.speed>=1 && state.speed<=3)) state.speed = 1;
    const VALID_TERRAIN = new Set(['soil','dead','water','pond','trees','barn','coop','riverbed'].concat(BUILDINGS));
    state.grid = st.grid.map((sg,i)=>{
      const t = Object.assign(newTile(i%GRID, (i/GRID)|0), sg);
      t.region = regionOf(t.c, t.r);
      if(!VALID_TERRAIN.has(t.terrain)) t.terrain = 'soil';
      if(t.crop && !CROPS[t.crop.type]) t.crop = null;
      if(t.graze && t.graze.kind!=='team' && !GRAZE[t.graze.kind]) t.graze = null;
      SOIL_ATTRS.forEach(k=>{ if(typeof t.soil[k]!=='number' || isNaN(t.soil[k])) t.soil[k] = 10; });
      recalc(t);
      return t;
    });
    // respawn animals
    agents = [];
    state.grid.forEach((t,i)=>{
      if(t.terrain==='stable') spawnAnimals(i, 'horse', 1);
      if(!t.graze) return;
      const kind = t.graze.kind;
      if(kind==='cattle' || kind==='team') spawnAnimals(i, 'cow', 2);
      if(kind==='chicken' || kind==='team') spawnAnimals(i, 'chicken', 3);
      if(kind==='sheep' || kind==='goat' || kind==='pig') spawnAnimals(i, kind, 2);
      if(kind==='duckT') spawnAnimals(i, 'duckT', 3);
    });
    soundOn = state.sound!==false;
    camp.cur = lv;
    return true;
  }catch(e){ return false; }
}

// ------------------------------------------- journey (level select) & level flow
function levelHasProgress(){
  return !!state && (state.day>1 || state.seasonCount>0 || state.stats.planted>0 ||
    state.stats.composts>0 || state.stats.revived>0 || state.stats.grazes>0);
}
function buildJourney(){
  const path = document.getElementById('jpath');
  path.innerHTML = '';
  LEVELS.forEach((L,i)=>{
    const done = !!camp.done[i];
    const unlocked = i<=camp.unlocked;
    const isCur = state && state.lv===i;
    const el = document.createElement('button');
    el.className = 'jnode'+(unlocked?'':' locked')+(done?' done':'')+((isCur&&unlocked)?' cur':'');
    const stars = done ? '⭐'.repeat(Math.max(1, camp.stars[i]||1)) : '';
    const st = !unlocked ? '🔒 locked'
             : done ? `✓ done<br>${stars}`
             : (isCur && levelHasProgress()) ? '▶ continue' : '▶ play';
    el.innerHTML = `<span class="jem">${unlocked?L.em:'🔒'}</span>
      <span><span class="jnm">${i+1}. ${L.name}</span><div class="jts">${L.teaser}</div></span>
      <span class="jst">${st}</span>`;
    el.addEventListener('click', ()=>journeyPick(i));
    path.appendChild(el);
  });
}
function showJourney(){
  buildJourney();
  journeyOpen = true;
  document.getElementById('journey').classList.add('show');
  document.getElementById('tut').classList.remove('show');
  closeInfo();
}
function hideJourney(){
  journeyOpen = false;
  document.getElementById('journey').classList.remove('show');
}
function journeyPick(lv){
  if(lv>camp.unlocked){ toast('🔒 Finish the earlier plots to unlock this one!'); SND.uhoh(); return; }
  SND.pop();
  if(state && state.lv===lv){ enterLevel(lv, false); return; }   // resume the current plot
  if(state && !state.levelDone && levelHasProgress() &&
     !confirm(`Start "${LEVELS[lv].name}"? Your unfinished progress on "${LEVELS[state.lv].name}" will be reset.`)) return;
  enterLevel(lv, true);
}
function enterLevel(lv, fresh){
  camp.cur = lv;
  if(fresh || !state || state.lv!==lv){
    state = newGame(lv);
    agents = []; wildlife = []; birds = []; worldParts = []; screenParts = [];
    decoIdx = 0; sciOpen = false;
  }
  GRID = state.gridSize;
  selected = -1; hovered = -1;
  tool = 'select';
  canvas.classList.remove('tooling');
  closeModal(); closeInfo();
  layout(); centerCamera();
  applyLevelUI();
  setOverlay('none');
  updateHUD(); updateClockUI(); updateQuests(); refreshAnchors();
  hideJourney();
  save();
  if(!state.introSeen){ state.introSeen = true; showLevelIntro(); save(); }
  else if(!state.tutDone) setTut(state.tutStep||0);
  else document.getElementById('tut').classList.remove('show');
}
function showLevelIntro(){
  const L = LV();
  document.getElementById('tut').classList.remove('show');
  showModal(`
    <h2>${L.em} ${L.name}</h2>
    <div class="sub">Plot ${state.lv+1} of ${LEVELS.length}</div>
    <div class="eventbig">${L.em}</div>
    <div class="eventkid">${L.story}</div>
    <div class="lesson">🎯 ${L.goalText}</div>
    <div class="modalbtns"><button class="mbtn big" data-act="lvgo">${L.startPaused?'Look around 🖐️':'Start! 🌱'}</button></div>`);
}
// show/hide the pieces of UI this level actually uses
function applyLevelUI(){
  const L = LV();
  buildPalette();
  document.getElementById('btnShop').style.display = L.shop ? '' : 'none';
  document.getElementById('wqPill').style.display = L.river ? '' : 'none';
  document.querySelectorAll('.ovbtn').forEach(b=>{
    const ov = b.dataset.ov;
    b.style.display = (ov==='none' || L.ovs.indexOf(ov)>=0) ? '' : 'none';
  });
}

// ---------------------------------------------------------------- init
function layout(){
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  DPR = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.round(viewW*DPR);
  canvas.height = Math.round(viewH*DPR);
  fitZoom = Math.max(0.3, Math.min((viewW-30)/(GRID*TILE_W+60), (viewH-170)/(GRID*TILE_H+120)));
  clampCam();
}
function init(){
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  loadSprites();
  const bundle = loadBundle();
  loadCamp(bundle);
  let resumed = false;
  if(bundle) resumed = loadLevelState(bundle);
  if(!resumed) state = newGame(camp.cur);
  layout();
  centerCamera();
  applyLevelUI();
  // canvas input
  canvas.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);
  canvas.addEventListener('wheel', onWheel, {passive:false});
  canvas.addEventListener('contextmenu', e=>e.preventDefault());
  window.addEventListener('resize', layout);
  // HUD buttons
  document.getElementById('btnPause').addEventListener('click', ()=>{
    state.paused = !state.paused;
    updateClockUI();
    toast(state.paused ? '⏸️ Paused — build freely, time waits for you.' : '▶️ Time flows again!');
    SND.pop(); save();
  });
  document.getElementById('btnSpeed').addEventListener('click', ()=>{
    state.speed = state.speed>=3 ? 1 : state.speed+1;
    if(state.paused){ state.paused = false; }
    updateClockUI();
    toast(`⏩ Speed ${state.speed}×`);
    SND.pop(); save();
  });
  document.getElementById('btnGoals').addEventListener('click', openGoals);
  document.getElementById('btnSound').addEventListener('click', function(){
    soundOn = !soundOn;
    this.textContent = soundOn ? '🔊' : '🔇';
    if(soundOn) SND.pop();
    save();
  });
  document.getElementById('btnSound').textContent = soundOn ? '🔊' : '🔇';
  // overlays
  document.querySelectorAll('.ovbtn').forEach(b=>{
    b.addEventListener('click', ()=>{ setOverlay(b.dataset.ov); SND.pop(); });
  });
  // modal delegation (incl. shop buys & tabs)
  document.getElementById('modalWrap').addEventListener('click', e=>{
    const buyEl = e.target.closest('[data-buy]');
    if(buyEl){ buyShopItem(buyEl.dataset.buy); return; }
    const catEl = e.target.closest('[data-shopcat]');
    if(catEl){ openShop(catEl.dataset.shopcat); SND.pop(); return; }
    const actEl = e.target.closest('[data-act]');
    if(!actEl){ if(e.target===document.getElementById('modalWrap')) closeModal(); return; }
    const act = actEl.dataset.act;
    if(act==='close') closeModal();
    else if(act==='reset') resetGame();
    else if(act==='splashgo'){ closeModal(); showJourney(); }
    else if(act==='lvgo'){ closeModal(); if(!state.tutDone) setTut(state.tutStep||0); }
    else if(act==='gojourney'){ closeModal(); save(); showJourney(); }
    else if(act==='nextlevel'){ closeModal(); if(state.lv<LEVELS.length-1) enterLevel(state.lv+1, true); }
  });
  // shop + quest panel
  document.getElementById('btnShop').addEventListener('click', ()=>{ openShop(); SND.pop(); });
  document.getElementById('qHead').addEventListener('click', ()=>{
    const qp = document.getElementById('questPanel');
    qp.classList.toggle('min');
    document.getElementById('qCaret').textContent = qp.classList.contains('min') ? '▲' : '▼';
    SND.pop();
  });
  // keyboard (desktop bonus)
  window.addEventListener('keydown', e=>{
    if(e.target.tagName==='INPUT') return;
    if(e.key===' '){ e.preventDefault(); document.getElementById('btnPause').click(); }
    if(e.key==='Escape'){
      if(modalOpen) closeModal();
      else { tool='select'; document.querySelectorAll('.tool').forEach(el=>el.classList.toggle('active', el.id==='tool_select')); canvas.classList.remove('tooling'); }
    }
    if(e.key==='+'||e.key==='='){ cam.zoom=Math.min(2.4,cam.zoom*1.15); clampCam(); }
    if(e.key==='-'){ cam.zoom=Math.max(fitZoom*0.55,cam.zoom*0.87); clampCam(); }
    const n = parseInt(e.key,10);
    if(n>=1 && n<=TOOLS.length){
      const el = document.getElementById('tool_'+TOOLS[n-1].id);
      if(el) el.click();
    }
  });
  // journey button — autosaves, then back to the level map
  document.getElementById('btnJourney').addEventListener('click', ()=>{ save(); SND.pop(); showJourney(); });
  updateHUD();
  updateClockUI();
  updateQuests();
  refreshAnchors();
  if(!bundle) showSplash();     // brand new: title first, then the journey map
  else showJourney();           // returning: straight to the journey (▶ continue)
  requestAnimationFrame(frame);
}
function showSplash(){
  showModal(`
    <h2>🌱 Rootweave</h2>
    <img src="sprites/title_farm.webp" alt="" style="width:100%; border-radius:14px; border:2px solid var(--line); display:block" onerror="this.style.display='none'">
    <div class="eventkid"><b>The valley is dying.</b><br>Dust where wheat once stood, a dry creek, a muddy river.<br><br>Your journey home starts small — one little plot at a time — and ends with the whole valley alive again.</div>
    <div class="lesson">🌱 Feed the dead ground, plant many kinds, move the animals, shelter the water — and life returns, field by field.</div>
    <div class="modalbtns"><button class="mbtn big" data-act="splashgo">Begin the journey 🥾</button></div>
  `);
}
window.addEventListener('load', init);
</script>
