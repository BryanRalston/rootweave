<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#3a5a40">
<title>Rootweave 🌱</title>
<style>
:root{
  --cream:#f6e7c6; --card:#f9edd0; --wood:#8a5a33; --wood2:#6b4423; --bark:#4a2f1a;
  --green:#4f9147; --green2:#3b7238; --gold:#eab543; --gold2:#c98f1e; --terra:#c96f3b;
  --ink:#3b2d1d; --soft:#8a7052; --line:#b98d5e;
  --glass:linear-gradient(180deg,#f9eccb 0%,#f1ddb0 100%);
  --woodgrain:linear-gradient(180deg,#a5713f 0%,#8a5a33 45%,#7c4f2b 100%);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none}
html,body{margin:0; padding:0; height:100%; overflow:hidden; position:fixed; inset:0; width:100%}
body{
  font-family:"Segoe UI Rounded","Segoe UI",system-ui,-apple-system,sans-serif;
  background:#0e1a12; color:var(--ink); overscroll-behavior:none;
}
canvas#game{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; cursor:grab}
canvas#game.tooling{cursor:crosshair}
/* ---------- top HUD bar ---------- */
#topbar{
  position:absolute; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:8px 10px calc(8px) 10px; pointer-events:none;
}
#topbar > *{pointer-events:auto}
.hudpill{
  background:var(--glass); border:2px solid var(--line); border-bottom-color:var(--wood2); border-radius:999px;
  padding:6px 12px; font-size:14.5px; font-weight:800; color:var(--ink);
  box-shadow:0 3px 8px rgba(20,14,4,.35), inset 0 1px 0 rgba(255,250,230,.8); white-space:nowrap;
  display:flex; align-items:center; gap:6px;
}
.hudpill b{color:var(--wood2)}
#brand{font-size:16px; color:var(--wood2); letter-spacing:.3px}
.hudspacer{flex:1; pointer-events:none !important}
.hudbtn{
  background:var(--glass); border:2px solid var(--line); border-bottom:3px solid var(--wood2); border-radius:14px;
  font-size:17px; min-width:42px; min-height:40px; padding:4px 10px; cursor:pointer;
  box-shadow:0 3px 8px rgba(20,14,4,.35), inset 0 1px 0 rgba(255,250,230,.8); font-weight:800; color:var(--ink);
  font-family:inherit; display:flex; align-items:center; justify-content:center; gap:4px;
}
.hudbtn:active{transform:translateY(2px); box-shadow:0 1px 4px rgba(20,14,4,.2)}
.hudbtn.on{background:linear-gradient(180deg,#ffedb8,#f5d98a); border-color:var(--gold2)}
#clockGroup{display:flex; gap:4px}
.hudpill .minibar{display:inline-block; width:64px; height:9px; background:#e7dcbf; border-radius:99px; overflow:hidden; border:1px solid var(--line); vertical-align:middle}
.hudpill .minifill{display:block; height:100%; background:linear-gradient(90deg,#c98a3d,#4a8f4d); border-radius:99px; transition:width .5s}
#wqPill .minibar{width:52px}
#wqPill .minifill{background:linear-gradient(90deg,#9a8340,#3d9ec7)}
.chips{display:flex; gap:3px; font-size:17px}
.chip{filter:grayscale(1); opacity:.32; transition:all .5s; transform:scale(.9)}
.chip.on{filter:none; opacity:1; transform:scale(1.1)}
/* ---------- overlay (data view) bar ---------- */
#overlaybar{
  position:absolute; right:10px; top:64px; z-index:19; display:flex; flex-direction:column; gap:5px; align-items:flex-end;
}
.ovbtn{
  background:var(--glass); border:2px solid var(--line); border-bottom:3px solid var(--wood2); border-radius:12px; cursor:pointer;
  font-family:inherit; font-size:12.5px; font-weight:800; color:var(--ink); padding:6px 10px;
  box-shadow:0 3px 8px rgba(20,14,4,.3), inset 0 1px 0 rgba(255,250,230,.8); display:flex; align-items:center; gap:5px; min-height:36px;
}
.ovbtn.on{background:linear-gradient(180deg,#e4f0cd,#cfe3ae); border-color:var(--green2)}
/* ---------- quest / region panel ---------- */
#questPanel{
  position:absolute; left:10px; top:64px; z-index:19; width:236px; max-width:46vw;
  background:var(--glass); border:2px solid var(--line); border-bottom:3px solid var(--wood2);
  border-radius:14px; box-shadow:0 4px 12px rgba(20,14,4,.35), inset 0 1px 0 rgba(255,250,230,.8);
  font-size:12.5px; color:var(--ink); overflow:hidden;
  transition:opacity .18s ease;
}
/* while a dialog or the intro/tutorial is open, tuck the quest panel away so
   the floating windows never stack on top of each other (esp. on phones) */
body.overlay-open #questPanel{ opacity:0; pointer-events:none; }
#questPanel .qhead{
  background:var(--woodgrain); color:#ffeece; font-weight:800; padding:7px 10px; font-size:13px;
  display:flex; align-items:center; gap:6px; cursor:pointer; text-shadow:0 1px 2px rgba(30,15,0,.5);
}
#questPanel .qhead .qcaret{margin-left:auto; font-size:11px; opacity:.85}
#questPanel .qbody{padding:8px 10px 9px}
#questPanel.min .qbody{display:none}
.qgoal{font-weight:800; color:var(--wood2); margin-bottom:3px; line-height:1.25}
.qbarw{height:10px; background:#e2cd9d; border-radius:99px; overflow:hidden; border:1px solid var(--line); margin:4px 0 8px}
.qbar{height:100%; border-radius:99px; background:linear-gradient(90deg,var(--gold),var(--green)); transition:width .5s}
.qtask{display:flex; gap:6px; align-items:flex-start; padding:4px 6px; margin:3px 0; border-radius:9px; background:rgba(255,248,226,.7); font-weight:700; line-height:1.2}
.qtask.done{background:#dcedc9; color:var(--green2)}
.qtask .qem{width:18px; text-align:center; flex:none}
.qtask .qprog{margin-left:auto; font-family:ui-monospace,monospace; font-size:11px; color:var(--soft); flex:none}
.qtask.done .qprog{color:var(--green2)}
/* ---------- shop ---------- */
.shoptabs{display:flex; gap:5px; margin:6px 0 8px}
.shoptab{flex:1; font-family:inherit; font-weight:800; font-size:12.5px; padding:7px 4px; border-radius:10px;
  border:2px solid var(--line); background:#f2e2ba; cursor:pointer; color:var(--soft)}
.shoptab.on{background:var(--woodgrain); color:#ffeece; border-color:var(--wood2)}
.shopitem{display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:12px; margin:5px 0;
  background:rgba(255,248,226,.75); border:1.5px solid #dcc490}
.shopitem .sem{font-size:24px; width:32px; text-align:center; flex:none}
.shopitem .snm{font-weight:800; font-size:13.5px; color:var(--wood2)}
.shopitem .sds{font-size:11px; font-weight:600; color:var(--soft); line-height:1.25}
.shopbuy{margin-left:auto; flex:none; font-family:inherit; font-weight:800; font-size:12.5px; color:#5a3d10;
  background:linear-gradient(180deg,var(--gold),#e3a92e); border:none; border-radius:10px; padding:8px 10px;
  cursor:pointer; box-shadow:0 3px 0 var(--gold2); min-width:64px}
.shopbuy:active{transform:translateY(2px); box-shadow:0 1px 0 var(--gold2)}
.shopbuy:disabled{background:#d8c9a4; box-shadow:0 3px 0 #b3a37e; color:#8a7a5c; cursor:default}
.shopitem.owned{opacity:.62}
.shopitem.owned .shopbuy{background:#c5d9ad; box-shadow:0 3px 0 #9db384; color:#3b6b2e}
#legend{
  display:none; background:var(--glass); border:2px solid var(--line); border-radius:12px;
  padding:7px 10px; font-size:11.5px; font-weight:700; color:var(--soft);
  box-shadow:0 3px 8px rgba(20,14,4,.22); text-align:center;
}
#legend.show{display:block}
#legend .lbar{width:110px; height:10px; border-radius:99px; margin:4px auto 2px; border:1px solid rgba(0,0,0,.15)}
#legend .lrow{display:flex; justify-content:space-between; width:110px; margin:0 auto}
/* ---------- build palette ---------- */
#palette{
  position:absolute; left:0; right:0; bottom:0; z-index:20;
  display:flex; gap:6px; align-items:flex-end; padding:8px 10px calc(10px + env(safe-area-inset-bottom,0px));
  overflow-x:auto; overflow-y:hidden; scrollbar-width:none;
  background:linear-gradient(180deg,transparent,rgba(10,18,10,.35));
}
#palette::-webkit-scrollbar{display:none}
.toolgroup{display:flex; flex-direction:column; gap:3px; flex:none}
.grouplabel{font-size:10px; font-weight:800; color:#f5eed8; text-shadow:0 1px 3px rgba(0,0,0,.6); letter-spacing:.6px; padding-left:4px; text-transform:uppercase}
.grouprow{display:flex; gap:6px}
.tool{
  background:var(--glass); border:2px solid var(--line); border-bottom:3px solid var(--wood2); border-radius:14px; cursor:pointer;
  font-family:inherit; width:66px; min-height:62px; padding:5px 2px 4px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
  box-shadow:0 3px 8px rgba(20,14,4,.35), inset 0 1px 0 rgba(255,250,230,.8); transition:transform .08s; flex:none;
}
.tool:active{transform:translateY(2px)}
.tool .tem{font-size:22px; line-height:1.1}
.tool .tnm{font-size:10.5px; font-weight:800; color:var(--ink); line-height:1.1}
.tool .tcost{font-size:10px; font-weight:800; color:var(--gold2)}
.tool.active{background:linear-gradient(180deg,#ffedb8,#f5d98a); border-color:var(--gold2); box-shadow:0 0 0 3px rgba(234,181,67,.5), 0 3px 8px rgba(20,14,4,.3); transform:scale(1.06)}
.tool.cant .tcost{color:#c05540}
.tool.shopbtn{background:var(--woodgrain)}
.tool.shopbtn .tnm{color:#ffeece}
.tool.shopbtn .tcost{color:#f5d98a}
/* ---------- info panel ---------- */
#infoPanel{
  position:absolute; left:10px; bottom:96px; z-index:21; width:290px; max-width:calc(100% - 20px);
  max-height:52vh; overflow-y:auto; display:none;
  background:var(--glass); border:2px solid var(--line); border-radius:16px;
  padding:12px 14px; box-shadow:0 8px 26px rgba(10,8,2,.4); font-size:14px;
}
#infoPanel.show{display:block; animation:slideUp .22s ease}
@keyframes slideUp{from{opacity:0; transform:translateY(16px)}to{opacity:1; transform:none}}
#infoPanel h3{margin:0 0 4px; font-size:16px; color:var(--wood2); display:flex; align-items:center; gap:6px}
#infoPanel .closex{margin-left:auto; cursor:pointer; font-size:15px; color:var(--soft); background:none; border:none; font-weight:800; padding:2px 6px}
#infoPanel .hbarw{height:13px; background:#e7dcbf; border-radius:99px; overflow:hidden; border:1px solid var(--line); margin:4px 0}
#infoPanel .hbar{height:100%; border-radius:99px; background:linear-gradient(90deg,#c98a3d,#a8c04a,#4a8f4d); transition:width .4s}
#infoPanel .chiprow{font-size:12.5px; color:var(--soft); font-weight:700; margin:5px 0}
.sciBtn{
  font-family:inherit; width:100%; margin-top:7px; background:#efe7d0; border:2px solid var(--line);
  border-radius:11px; font-weight:800; font-size:12.5px; padding:7px; cursor:pointer; color:var(--wood2);
}
#sciBox{display:none; margin-top:7px}
#sciBox.show{display:block}
.soilrow{display:flex; align-items:center; gap:7px; margin:3px 0}
.soilrow .lbl{width:118px; font-weight:700; color:var(--soft); font-size:11px}
.soilrow .bar{flex:1; height:9px; background:#e7dcbf; border-radius:99px; overflow:hidden; border:1px solid var(--line)}
.soilrow .fill{height:100%; border-radius:99px}
.soilrow .num{width:26px; text-align:right; font-family:ui-monospace,monospace; font-size:11px}
.scinote{font-size:11px; color:var(--soft); font-weight:600; margin-top:5px}
/* ---------- toasts ---------- */
#toasts{position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:60; display:flex; flex-direction:column; gap:6px; align-items:center; pointer-events:none; width:92%; max-width:430px}
.toast{
  background:rgba(58,49,40,.94); color:#fff7e6; font-size:14.5px; font-weight:700;
  padding:9px 17px; border-radius:14px; box-shadow:0 6px 20px rgba(0,0,0,.35);
  animation:toastIn .3s ease, toastOut .5s ease 3s forwards; text-align:center; max-width:100%;
}
@keyframes toastIn{from{opacity:0; transform:translateY(-14px) scale(.9)}to{opacity:1; transform:none}}
@keyframes toastOut{to{opacity:0; transform:translateY(-10px)}}
/* ---------- modal ---------- */
#modalWrap{position:fixed; inset:0; background:rgba(20,16,8,.55); z-index:70; display:none; align-items:center; justify-content:center; padding:16px}
#modalWrap.show{display:flex}
#modalBox{
  background:radial-gradient(120% 100% at 50% 0%, #fbf0d4 0%, #f3e0b4 100%);
  border-radius:22px; max-width:440px; width:100%;
  max-height:84vh; overflow:auto; padding:18px 18px 14px; box-shadow:0 20px 60px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,250,230,.6);
  animation:popIn .25s ease; border:3px solid var(--wood);
}
@keyframes popIn{from{transform:scale(.85); opacity:0}to{transform:none; opacity:1}}
#modalBox h2{margin:0 0 4px; font-size:21px; color:var(--wood2); display:flex; align-items:center; gap:8px}
#modalBox .sub{color:var(--soft); font-size:13.5px; margin-bottom:10px; font-weight:600}
.goalitem{display:flex; align-items:center; gap:10px; padding:6px 10px; border-radius:12px; margin:4px 0; font-size:13.5px; font-weight:700}
.goalitem.done{background:#eaf5e2; color:var(--green2)}
.goalitem.todo{background:#f6f0dd; color:var(--soft)}
.goalitem .gm{font-size:20px; width:28px; text-align:center}
.goalitem.todo .gm{filter:grayscale(1); opacity:.5}
.modalbtns{display:flex; gap:8px; margin-top:12px}
.mbtn{
  font-family:inherit; flex:1; font-size:15.5px; font-weight:800; color:#fff;
  background:var(--green); border:none; border-radius:13px; padding:12px 8px;
  cursor:pointer; box-shadow:0 4px 0 var(--green2); min-height:48px;
}
.mbtn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--green2)}
.mbtn.wood{background:var(--wood); box-shadow:0 4px 0 var(--wood2)}
.mbtn.wood:active{box-shadow:0 1px 0 var(--wood2)}
.mbtn.big{background:linear-gradient(180deg,var(--gold),#eaa62a); color:#5a3d10; box-shadow:0 5px 0 var(--gold2); font-size:17px}
.mbtn.big:active{box-shadow:0 1px 0 var(--gold2)}
.eventbig{font-size:52px; text-align:center; margin:4px 0}
.eventkid{font-size:16px; text-align:center; font-weight:700; margin:6px 0}
.eventlines{font-size:14px; margin:8px 0; font-weight:600}
.eventlines div{padding:3px 0}
.lesson{
  background:#eef5e4; border:2px dashed #a8c890; border-radius:12px; padding:9px 12px;
  font-size:13px; font-style:italic; color:var(--green2); font-weight:600;
}
.winstats{text-align:center; font-size:14.5px; font-weight:700; margin:8px 0; color:var(--soft)}
/* ---------- tutorial ---------- */
#tut{
  position:fixed; left:50%; transform:translateX(-50%); bottom:100px; z-index:65;
  background:#fffbe9; border:3px solid var(--gold); border-radius:18px; padding:12px 15px;
  max-width:400px; width:92%; box-shadow:0 10px 30px rgba(0,0,0,.4); display:none;
  font-size:14.5px; font-weight:700;
}
#tut.show{display:block; animation:popIn .3s ease}
#tut .skip{float:right; font-size:11.5px; color:var(--soft); cursor:pointer; text-decoration:underline; font-weight:600; margin-left:10px}
#tut .tnext{
  font-family:inherit; margin-top:8px; width:100%; background:var(--gold); border:none; border-radius:12px;
  font-weight:800; font-size:14px; padding:10px; cursor:pointer; color:#5a3d10; box-shadow:0 3px 0 var(--gold2);
}
#tut .tnext:active{transform:translateY(2px); box-shadow:0 1px 0 var(--gold2)}
/* ---------- journey (level select) ---------- */
#journey{position:fixed; inset:0; z-index:62; display:none; flex-direction:column; align-items:center; overflow-y:auto; background:#0e1a12}
#journey.show{display:flex}
#journey .jbg{position:fixed; inset:0; background:url('sprites/title_farm.webp') center/cover no-repeat; opacity:.55; pointer-events:none}
#journey .jshade{position:fixed; inset:0; background:linear-gradient(180deg, rgba(8,14,8,.74) 0%, rgba(8,14,8,.38) 42%, rgba(8,14,8,.8) 100%); pointer-events:none}
#journey .jwrap{position:relative; z-index:1; width:100%; max-width:470px; padding:24px 18px calc(30px + env(safe-area-inset-bottom,0px))}
#journey h1{color:#ffeece; font-size:30px; margin:4px 0 2px; text-align:center; text-shadow:0 2px 8px rgba(0,0,0,.6)}
#journey .jsub{color:#e8d9ae; font-size:13.5px; font-weight:700; text-align:center; margin-bottom:20px; text-shadow:0 1px 4px rgba(0,0,0,.7)}
.jnode{position:relative; display:flex; align-items:center; gap:12px; width:100%; text-align:left;
  background:var(--glass); border:2px solid var(--line); border-bottom:4px solid var(--wood2); border-radius:18px;
  padding:12px 14px; margin:0 0 26px; cursor:pointer; font-family:inherit; min-height:74px;
  box-shadow:0 6px 18px rgba(10,8,2,.45), inset 0 1px 0 rgba(255,250,230,.8)}
.jnode:active{transform:translateY(2px)}
.jnode .jem{width:52px; height:52px; flex:none; border-radius:50%; background:var(--woodgrain); border:2px solid var(--wood2);
  display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:inset 0 2px 4px rgba(0,0,0,.25)}
.jnode .jnm{font-weight:800; font-size:16.5px; color:var(--wood2)}
.jnode .jts{font-size:12px; font-weight:700; color:var(--soft); line-height:1.25; margin-top:1px}
.jnode .jst{margin-left:auto; flex:none; font-weight:800; font-size:12.5px; text-align:right; color:var(--green2); white-space:nowrap; line-height:1.35}
.jnode.locked{filter:grayscale(.85); opacity:.62; cursor:default}
.jnode.locked .jst{color:var(--soft)}
.jnode.done{border-color:#8fb768}
.jnode.cur .jem{box-shadow:0 0 0 3px rgba(234,181,67,.65), inset 0 2px 4px rgba(0,0,0,.25)}
.jnode:not(:last-child)::after{content:''; position:absolute; left:38px; top:100%; height:26px; border-left:4px dotted rgba(245,230,190,.75)}
#btnJourney .jlbl{font-size:12.5px; margin-left:3px}
@media(max-width:640px){
  #brand span{display:none}
  #btnJourney .jlbl{display:none}
  .hudpill{font-size:12.5px; padding:5px 9px}
  .hudbtn{min-width:38px; min-height:36px; font-size:15px}
  #overlaybar{top:auto; bottom:96px}
  #infoPanel{bottom:96px; width:260px}
  .tool{width:58px; min-height:58px}
  #questPanel{width:200px; top:auto; bottom:170px}
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="topbar">
  <span class="hudpill" id="brand">🌱 <span>Rootweave</span></span>
  <button class="hudbtn" id="btnJourney" title="Back to the journey map (progress autosaves)">◀🗺️<span class="jlbl">Journey</span></button>
  <span class="hudpill" id="seasonPill">🌸 Spring · Y1</span>
  <span class="hudpill">🪙 <b id="coinsEl">75</b></span>
  <span id="clockGroup">
    <button class="hudbtn" id="btnPause" title="Pause / play">⏸️</button>
    <button class="hudbtn" id="btnSpeed" title="Game speed">1×</button>
  </span>
  <span class="hudpill" id="goalPill" title="Tiles restored to healthy soil">
    🏡 <b id="restoredEl">0/97</b>
    <span class="minibar"><span class="minifill" id="goalFill"></span></span>
  </span>
  <span class="hudpill" id="wqPill" title="River water quality — living soil & buffer plants send clean water downstream!">
    💧 <b id="wqEl">35</b>
    <span class="minibar"><span class="minifill" id="wqFill"></span></span>
  </span>
  <span class="hudpill chips" title="Wildlife returns as the farm gets wilder!">
    <span class="chip" id="chipBees">🐝</span><span class="chip" id="chipFlies">🦋</span><span class="chip" id="chipBirds">🐦</span>
  </span>
  <span class="hudspacer"></span>
  <button class="hudbtn" id="btnShop" title="Shop — unlock buildings, animals & upgrades">🛒</button>
  <button class="hudbtn" id="btnGoals" title="Goals & badges">⭐</button>
  <button class="hudbtn" id="btnSound" title="Sound on/off">🔊</button>
</div>

<div id="questPanel">
  <div class="qhead" id="qHead">🎯 <span id="qRegion">Homestead Vale</span><span class="qcaret" id="qCaret">▼</span></div>
  <div class="qbody" id="qBody"></div>
</div>

<div id="overlaybar">
  <button class="ovbtn on" data-ov="none">🌈 Natural</button>
  <button class="ovbtn" data-ov="health">💚 Soil Health</button>
  <button class="ovbtn" data-ov="water">💧 Water</button>
  <button class="ovbtn" data-ov="bio">🐝 Biodiversity</button>
  <button class="ovbtn" data-ov="om">🍂 Organic Matter</button>
  <button class="ovbtn" data-ov="runoff">🌊 Runoff</button>
  <div id="legend"><div id="legendTitle">Soil Health</div><div class="lbar" id="legendBar"></div><div class="lrow"><span id="legendLo">poor</span><span id="legendHi">rich</span></div></div>
</div>

<div id="palette"></div>
<div id="infoPanel"></div>
<div id="toasts"></div>
<div id="modalWrap"><div id="modalBox"></div></div>
<div id="tut"></div>
<div id="journey">
  <div class="jbg"></div><div class="jshade"></div>
  <div class="jwrap">
    <h1>🌱 Rootweave</h1>
    <div class="jsub">The journey home — heal the land, one plot at a time</div>
    <div id="jpath"></div>

function clamp(v){ return Math.max(0, Math.min(100, v)); }

function sr(n){ const x = Math.sin(n*127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }
function idx(c,r){ return r*GRID + c; }
function inGrid(c,r){ return c>=0 && c<GRID && r>=0 && r<GRID; }

function newTile(c,r){
  const i = idx(c,r);
  const t = {
    c, r, terrain:'soil', region:regionOf(c,r), feature:null, deco:null, fence:false, bridge:false,
    soil:{
      om:        20 + sr(i*7+1)*14,
      structure: 24 + sr(i*5+2)*12,
      nutrients: 28 + sr(i*3+3)*11,
      water:     30 + sr(i*2+4)*12,
      microbial: 20 + sr(i*11+5)*13,
      erosion:   26 + sr(i*13+6)*12,
    },
    crop:null, graze:null, sinceCattle:999, compost:0, flowers:0, health:0,
  };
  recalc(t);
  return t;
}
function makeDead(t){
  const i = idx(t.c,t.r);
  t.terrain = 'dead';
  SOIL_ATTRS.forEach((k,ki)=>{ t.soil[k] = 3 + sr(i*7+ki*13+2)*11; });
  t.crop = null; t.flowers = 0;
  recalc(t);
}
function recalc(t){
  t.health = SOIL_ATTRS.reduce((a,k)=>a+t.soil[k],0) / SOIL_ATTRS.length;
}

// ---------------- per-level world generation ----------------
function seedSoil(t, base, spread){
  const i = idx(t.c,t.r);
  t.terrain = 'soil'; t.deco = null; t.feature = null;
  SOIL_ATTRS.forEach((k,ki)=>{ t.soil[k] = base + sr(i*5+ki)*spread; });
  recalc(t);
}
// LEVEL 1 — The Home Patch (6×6): a living heart, a tired ring, a dead edge.
// No river, no animals, no shop. Cannot fail.
function genHomePatch(s){
  s.grid.forEach(t=>{
    const d = Math.max(Math.abs(t.c-2.5), Math.abs(t.r-2.5));
    if(d<=0.5) seedSoil(t, 48, 14);        // 2×2 green heart
    else if(d<=1.5) seedSoil(t, 30, 10);   // tired but workable ring
    else makeDead(t);                      // the dead edge to wake up
  });
}
// LEVEL 2 — The Back Field (8×8): adds cattle, chickens & clover.
function genBackField(s){
  s.grid.forEach(t=>{
    const i = idx(t.c,t.r);
    const d = Math.max(Math.abs(t.c-2), Math.abs(t.r-2));
    if(d<=1) seedSoil(t, 46, 14);
    else if(d<=3) seedSoil(t, 28, 12);
    else if(sr(i*7+2)<0.7) makeDead(t);
    else seedSoil(t, 18, 10);
  });
  const b = s.grid[idx(1,1)]; b.terrain = 'barn'; b.deco = null; b.feature = null;
  [[6,1,'deco_stump'],[1,6,'deco_rock'],[6,6,'deco_deadtree']].forEach(([c,r,dc])=>{
    const t = s.grid[idx(c,r)]; if(t.terrain==='dead') t.deco = dc;
  });
}
// LEVEL 3 — The Creek Bottom (9×9): adds the creek, water quality, buffers, ponds.
function genCreek(s){
  s.grid.forEach(t=>{
    const i = idx(t.c,t.r);
    const d = Math.max(Math.abs(t.c-2), Math.abs(t.r-2));
    if(d<=1) seedSoil(t, 46, 14);
    else if(d<=3) seedSoil(t, 26, 12);
    else if(sr(i*7+2)<0.6) makeDead(t);
    else seedSoil(t, 16, 10);
  });
  const b = s.grid[idx(1,1)]; b.terrain = 'barn'; b.deco = null; b.feature = null;
  // the creek: north→south near the east side, drifting only eastward (tileset-safe)
  let rc = GRID-3;
  for(let r=0;r<GRID;r++){
    if(r>0 && r<GRID-1 && rc<GRID-2 && Math.random()<0.3){
      const w = s.grid[idx(rc,r)]; w.terrain = 'water'; w.deco = null; w.feature = null; w.crop = null;
      rc += 1;
    }
    const w = s.grid[idx(rc,r)]; w.terrain = 'water'; w.deco = null; w.feature = null; w.crop = null;
  }
  // muddy banks: ground beside the creek starts bare & sad — the runoff lesson
  const isW = (c,r)=> inGrid(c,r) && s.grid[idx(c,r)].terrain==='water';
  s.grid.forEach(t=>{
    if(t.terrain!=='soil') return;
    let adj = false;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){ if((dc||dr) && isW(t.c+dc,t.r+dr)) adj = true; }
    if(adj && t.health>40) seedSoil(t, 22, 10);
  });
}
// LEVEL 4 — The Dust Flats (11×11): salt pan, gullies, dry creekbed, tight coins.
function genDustFlats(s){
  s.grid.forEach(t=>makeDead(t));
  // thin murky river down the east side
  let rc = GRID-3;
  for(let r=0;r<GRID;r++){
    if(r>0 && r<GRID-1 && rc<GRID-2 && Math.random()<0.3){
      const w = s.grid[idx(rc,r)]; w.terrain = 'water'; w.deco = null; w.feature = null;
      rc += 1;
    }
    const w = s.grid[idx(rc,r)]; w.terrain = 'water'; w.deco = null; w.feature = null;
  }
  // dry creekbed crawling east toward the river
  let wr = 6;
  for(let c=0;c<GRID;c++){
    if(c>0 && Math.random()<0.35) wr += (Math.random()<0.5 ? -1 : 1);
    wr = Math.max(5, Math.min(7, wr));
    const t = s.grid[idx(c,wr)];
    if(t.terrain==='water') break;
    t.terrain = 'riverbed'; t.deco = null; t.feature = null;
  }
  // salt pan crusting the southwest
  for(let r=7;r<GRID;r++) for(let c=0;c<4;c++){
    const t = s.grid[idx(c,r)];
    if(t.terrain==='dead' && sr(idx(c,r)*3+7)<0.6) t.feature = 'saltflat';
  }
  // erosion gullies
  [[5,8],[8,3],[3,4],[9,9],[6,2]].forEach(([c,r])=>{
    const t = s.grid[idx(c,r)];
    if(t.terrain==='dead' && !t.feature) t.feature = 'gully';
  });
  // bones of the old land
  const DECOS = ['deco_deadtree','deco_stump','deco_bones','deco_boulder','deco_rock'];
  let placed = 0;
  for(let tries=0; tries<160 && placed<10; tries++){
    const i = (Math.random()*GRID*GRID)|0, t = s.grid[i];
    if(t.terrain!=='dead' || t.feature || t.deco) continue;
    if(t.c<=3 && t.r<=3) continue;
    t.deco = DECOS[(Math.random()*DECOS.length)|0]; placed++;
  }
  // homestead corner: barn + a scrap of living ground
  const b = s.grid[idx(1,1)]; b.terrain = 'barn'; b.deco = null; b.feature = null;
  for(let r=0;r<=3;r++) for(let c=0;c<=3;c++){
    const t = s.grid[idx(c,r)];
    if(t.terrain!=='dead') continue;
    const d = Math.max(Math.abs(c-1), Math.abs(r-1));
    if(d<=1) seedSoil(t, 45, 12);
    else if(d<=2) seedSoil(t, 26, 10);
  }
}
// LEVEL 5 — The Whole Valley (14×14): the original full dying-land generation.
function genValley(s){
  // ---- THE DYING LAND: almost everything starts dead
  s.grid.forEach(t=>makeDead(t));
  // ---- the RIVER: a thin, murky thread winding north→south through the east.
  // It only ever drifts EASTWARD as it flows south — the two bend directions the
  // illustrated tileset can draw (N↔E and W↔S) — staying 4-connected the whole way
  let rc = 8 + ((Math.random()*2)|0);
  const riverCol = [];
  for(let r=0;r<GRID;r++){
    if(r>0 && r<GRID-1 && rc<GRID-2 && Math.random()<0.35){
      s.grid[idx(rc,r)].terrain = 'water';   // the elbow tile (N↔E bend)
      rc += 1;                               // …then the step tile (W↔S bend)
    }
    riverCol.push(rc);
    s.grid[idx(rc,r)].terrain = 'water';
  }
  // ---- the DRY WASH: a cracked creekbed crawling east to meet the river
  let wr = 8;
  for(let c=0;c<GRID;c++){
    if(c>0 && Math.random()<0.35) wr += (Math.random()<0.5 ? -1 : 1);
    wr = Math.max(7, Math.min(9, wr));
    if(c >= riverCol[wr]) break;              // reached (or slipped past) the river
    const t = s.grid[idx(c,wr)];
    if(t.terrain==='water') break;
    t.terrain = 'riverbed'; t.deco = null;
  }
  // ---- SALT PAN: a poisoned white crust in the southeast
  for(let r=10;r<GRID;r++) for(let c=10;c<GRID;c++){
    const t = s.grid[idx(c,r)];
    if(t.terrain==='dead' && sr(idx(c,r)*3+7)<0.55) t.feature = 'saltflat';
  }
  // ---- EROSION GULLIES + old swale scars across the dead ground
  const scars = [[2,8,'gully'],[5,11,'gully'],[8,12,'gully'],[12,3,'gully'],[3,6,'swale'],[7,10,'swale'],[12,8,'gully']];
  scars.forEach(([c,r,f])=>{ const t = s.grid[idx(c,r)]; if(t.terrain==='dead' && !t.feature) t.feature = f; });
  // ---- bones of the old land: dead trees, stumps, boulders, bleached bones
  const DECOS = ['deco_deadtree','deco_deadtree','deco_stump','deco_bones','deco_boulder','deco_rock','deco_rock'];
  let placed = 0;
  for(let tries=0; tries<200 && placed<16; tries++){
    const i = (Math.random()*GRID*GRID)|0;
    const t = s.grid[i];
    if(t.terrain!=='dead' || t.feature || t.deco) continue;
    if(t.c<=4 && t.r<=4) continue;                       // keep the homestead approach clear
    t.deco = t.region==='orchard' ? (Math.random()<0.65?'deco_deadtree':'deco_stump') : DECOS[(Math.random()*DECOS.length)|0];
    placed++;
  }
  // ---- the HOMESTEAD: barn, coop, and the last living soil in the valley
  s.grid[idx(1,1)].terrain = 'barn'; s.grid[idx(1,1)].deco = null; s.grid[idx(1,1)].feature = null;
  s.grid[idx(2,1)].terrain = 'coop'; s.grid[idx(2,1)].deco = null; s.grid[idx(2,1)].feature = null;
  for(let r=0;r<=4;r++) for(let c=0;c<=4;c++){
    const t = s.grid[idx(c,r)];
    if(t.terrain!=='dead') continue;
    const d = Math.max(Math.abs(c-2), Math.abs(r-2));
    if(d<=1){                                            // the green heart: still truly alive
      t.terrain = 'soil'; t.deco = null; t.feature = null;
      SOIL_ATTRS.forEach((k,ki)=>{ t.soil[k] = 48 + sr(idx(c,r)*5+ki)*14; });
      recalc(t);
    }else if(d<=2){                                      // viable ring: tired but workable
      t.terrain = 'soil'; t.deco = null; t.feature = null;
      SOIL_ATTRS.forEach((k,ki)=>{ t.soil[k] = 32 + sr(idx(c,r)*5+ki)*12; });
      recalc(t);
    }else if(Math.random()<0.5){                         // frayed edge: barely hanging on
      t.terrain = 'soil'; t.deco = null;
      SOIL_ATTRS.forEach((k,ki)=>{ t.soil[k] = 16 + sr(idx(c,r)*9+ki)*10; });
      recalc(t);
    }
  }
}
function soilTiles(){ return state.grid.filter(t=>t.terrain==='soil'); }
function isWaterT(t){ return t.terrain==='pond' || t.terrain==='water'; }
function isWetT(t){ return t.terrain==='pond' || t.terrain==='water' || t.terrain==='wetland'; }
function isLandT(t){ return t.terrain==='soil' || t.terrain==='dead'; }   // restorable ground
const BUILDINGS = ['market','silo','greenhouse','beehive','orchard','raintank','wetland','stable',
  'wormfarm','birdhouse','well','windmill','solar','mushroom','berrybush'];
const BUILD_SET = new Set(BUILDINGS);
function farmStats(){
  let h=0, restored=0, micro=0, flowers=0, diverse=0, maxMicrobial=0, n=0, ponds=0, trees=0, dead=0;
  const bcounts = {};
  state.grid.forEach(t=>{
    if(t.terrain==='pond'){ ponds++; return; }
    if(t.terrain==='trees'){ trees++; return; }
    if(BUILD_SET.has(t.terrain)){ bcounts[t.terrain] = (bcounts[t.terrain]||0)+1; return; }
    if(t.terrain==='dead'){ dead++; n++; h += t.health; return; }
    if(t.terrain!=='soil') return;
    n++;
    h += t.health;
    micro += t.soil.microbial;
    flowers += t.flowers;
    if(t.health>=70) restored++;
    if(t.crop && CROPS[t.crop.type].diverse) diverse++;
    if(t.soil.microbial>maxMicrobial) maxMicrobial = t.soil.microbial;
  });
  const nAlive = Math.max(1, n-dead);
  const avgH = n? h/n : 0, avgMicro = micro/nAlive;
  let bio = (avgMicro-22)*0.9 + (flowers/nAlive)*34 + diverse*1.2
          + (restored/Math.max(1,n))*30 + trees*2.6 + ponds*2.2
          + (bcounts.beehive||0)*3 + (bcounts.wetland||0)*2.5 + (bcounts.orchard||0)*2.2
          + (bcounts.berrybush||0)*1.2 + (bcounts.birdhouse||0)*1.5 + (bcounts.mushroom||0)*1
          + (bcounts.stable||0)*1;
  if(state && state.waterQuality>=70) bio += 5;      // a clean river hums with life
  bio = Math.max(0, Math.min(100, bio));
  return {avgHealth:avgH, restored, totalSoil:n, dead, bio, maxMicrobial, ponds, trees, b:bcounts};
}
function pondNear(t, range){
  range = range||2;
  for(let dr=-range; dr<=range; dr++) for(let dc=-range; dc<=range; dc++){
    if(!inGrid(t.c+dc, t.r+dr)) continue;
    const nb = state.grid[idx(t.c+dc, t.r+dr)];
    if(isWetT(nb) || nb.terrain==='well' || nb.terrain==='raintank') return true;
  }
  return false;
}
function waterAdj(t){
  for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++){
    if((dc||dr) && inGrid(t.c+dc,t.r+dr) && isWaterT(state.grid[idx(t.c+dc,t.r+dr)])) return true;
  }
  return false;
}
// count buildings of a kind within range (Chebyshev) of a tile
function buildNear(t, kind, range){
  for(let dr=-range; dr<=range; dr++) for(let dc=-range; dc<=range; dc++){
    if(!inGrid(t.c+dc,t.r+dr)) continue;
    if(state.grid[idx(t.c+dc,t.r+dr)].terrain===kind) return true;
  }
  return false;
}
function waterTileIdx(){
  const list = [];
  state.grid.forEach((t,i)=>{ if(isWaterT(t)) list.push(i); });
  return list;
}
function treeAdj(t){
  for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++){
    if((dc||dr) && inGrid(t.c+dc,t.r+dr) && state.grid[idx(t.c+dc,t.r+dr)].terrain==='trees') return true;
  }
  return false;
}
function healthyNeighbors(t){
  let n=0;
  [[t.c-1,t.r],[t.c+1,t.r],[t.c,t.r-1],[t.c,t.r+1]].forEach(([c,r])=>{
    if(!inGrid(c,r)) return;
    const nb = state.grid[idx(c,r)];
    if(nb.terrain==='soil' && nb.health>=65) n++;
    if(nb.terrain==='trees' || isWaterT(nb)) n += 0.5;   // living edges help too
  });
  return n;
}

// ---------------------------------------------------------------- sound
function ensureAudio(){
  if(actx) return;
  try{ actx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ actx = null; }
}
function play(notes){
  if(!soundOn) return;
  ensureAudio();
  if(!actx) return;
  try{
    if(actx.state==='suspended') actx.resume();
    const t0 = actx.currentTime;
    notes.forEach(([f,off,dur])=>{
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0+off);
      g.gain.linearRampToValueAtTime(0.1, t0+off+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+off+dur);
      o.connect(g).connect(actx.destination);
      o.start(t0+off); o.stop(t0+off+dur+0.05);
    });
  }catch(e){}
}

// ---------------------------------------------------------------- particles
// world-space particles (floaters/bursts at tiles) + screen-space (confetti)
function tileWorld(i){
  const t = state.grid[i];
  return { x:(t.c-t.r)*TW2, y:(t.c+t.r)*TH2 + TH2 };   // diamond center
}
function floater(i, text, color, size){
  const p = tileWorld(i);
  worldParts.push({kind:'float', x:p.x, y:p.y-10, vy:-30, age:0, life:1.4, text, color:color||'#fff', size:size||15});
}
function burst(i, color, n){
  const p = tileWorld(i);
  for(let k=0;k<(n||10);k++){
    const a = Math.random()*Math.PI*2, sp = 30+Math.random()*55;
    worldParts.push({kind:'dot', x:p.x, y:p.y-6, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp*0.5-38, g:110, age:0, life:0.7+Math.random()*0.5, color, r:2+Math.random()*2.5});
  }
}
function ringAt(i, color){
  const p = tileWorld(i);
  worldParts.push({kind:'ring', x:p.x, y:p.y, age:0, life:0.55, color});
}
function confetti(n){
  const colors = ['#f2b93b','#4a8f4d','#e06666','#6fa8dc','#cc7ee0','#ff9f5a'];
  for(let i=0;i<(n||60);i++){
    screenParts.push({kind:'conf', x:Math.random()*viewW, y:-10-Math.random()*40,
      vx:(Math.random()-0.5)*60, vy:60+Math.random()*100, g:50, rot:Math.random()*6.28, vr:(Math.random()-0.5)*8,
      age:0, life:2.4+Math.random()*1.2, color:colors[i%colors.length], w:5+Math.random()*4, h:8+Math.random()*5});
  }
}
function updateParts(list, dt){
  for(let i=list.length-1;i>=0;i--){
    const p = list[i];
    p.age += dt;
    if(p.age >= p.life){ list.splice(i,1); continue; }
    if(p.kind==='float'){ p.y += p.vy*dt; }
    else if(p.kind==='dot' || p.kind==='conf'){
      p.vy += p.g*dt; p.x += p.vx*dt; p.y += p.vy*dt;
      if(p.kind==='conf') p.rot += p.vr*dt;
    }
  }
}
function drawParts(list){
  list.forEach(p=>{
    const k = 1 - p.age/p.life;
    if(p.kind==='float'){
      ctx.globalAlpha = Math.min(1, k*1.6);
      ctx.font = `800 ${p.size}px "Segoe UI",sans-serif`;
      ctx.textAlign = 'center';
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(40,30,10,.55)';
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, p.x, p.y);
      ctx.textAlign = 'left';
    }else if(p.kind==='dot'){
      ctx.globalAlpha = k;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.29); ctx.fill();
    }else if(p.kind==='ring'){
      ctx.globalAlpha = k*0.9;
      ctx.strokeStyle = p.color; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.ellipse(p.x, p.y, 6+(p.age/p.life)*34, 3+(p.age/p.life)*17, 0, 0, 6.29); ctx.stroke();
    }else if(p.kind==='conf'){
      ctx.globalAlpha = Math.min(1, k*2);
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  });
}

// ---------------------------------------------------------------- live sim
// WATER QUALITY — what the farm's practices deserve, 0..100. The river drifts
// toward this target. Bare soil, monocrops and riverside grazing muddy it;
// cover crops, healthy soil, ponds and ESPECIALLY riparian buffers clean it.
function computeWaterTarget(){
  let score = 50, buffers = 0, risk = 0;
  state.grid.forEach(t=>{
    if(t.terrain==='trees' || t.terrain==='orchard'){ if(waterAdj(t)) buffers++; return; }
    if(t.terrain==='pond'){ score += 2; return; }
    if(t.terrain==='wetland'){ score += waterAdj(t) ? 8 : 4; return; }   // nature's kidney
    if(t.terrain==='raintank'){ score += 1; return; }
    if(t.terrain==='dead'){
      if(waterAdj(t)) risk += 0.15;                         // dust & crust sliding in
      score -= 0.08;
      return;
    }
    if(t.terrain!=='soil') return;
    if(t.crop){
      const c = CROPS[t.crop.type];
      score += c.cover ? 0.5 : c.diverse ? 0.3 : -0.5;      // clover & sisters vs lonely wheat
    }else if(!t.graze && t.health<40) score -= 0.35;        // bare, crumbling dirt erodes
    if(t.health>70) score += 0.25;                          // spongy soil holds its ground
    if(t.soil.erosion<30) score -= 0.15;
    if(waterAdj(t)){                                        // the riparian zone matters most
      if(t.graze && t.graze.kind!=='duckT') risk += 1;      // hooves on the bank (ducks belong)
      if(t.graze && t.graze.kind==='duckT') score += 1;
      if(t.crop && !CROPS[t.crop.type].diverse) risk += 0.5;
      if(!t.crop && !t.graze && t.health<40) risk += 0.6;   // mud sliding straight in
    }
  });
  score += buffers*6;      // riparian buffers are the big lever — roots filter runoff
  score -= risk*4;
  return Math.max(5, Math.min(100, score));
}
// small daily trickle so an engaged player always has a next move; scales a
// little with restored land but never enough to win a neglected farm by itself
function dailyIncome(){
  const f = farmCache || farmStats();
  let inc = 2 + Math.min(4, (f.restored/6)|0);
  if(state.unlocks.upg_trickle) inc += 2;
  inc += (f.b.market||0)*3 + ((f.b.windmill||0)+(f.b.solar||0))*2;
  state.coins += inc;
  state.stats.coinsEarned += inc;
  if(!state.incomeTip && state.day>=2){
    state.incomeTip = true;
    toast('🧺 Farm stand: a few coins trickle in every day. Keep going!');
  }
}
// dd = game-days elapsed this frame (delta-time scaled; frame-rate independent)
function simStep(dt){
  const dd = dt / DAY_LEN;
  const f = farmCache || farmStats();
  const sn = SEASONS[state.season];
  const lvB = LV().regen || 1;           // early plots heal a touch faster — gentler lessons
  state.tod = (state.tod + dt/TOD_CYCLE) % 1;        // the sun wheels overhead
  state.grid.forEach((t,i)=>{
    // ---- DEAD GROUND never heals itself — only the player's care wakes it.
    // Remediation succession: compost / pioneer cover crops / goats (+ nearby
    // water helps the medicine work) raise it until it crosses into workable soil.
    if(t.terrain==='dead'){
      let feed = 0;
      if(t.compost>0){ feed += (t.feature==='saltflat'?0.55:0.9); t.compost = Math.max(0, t.compost-dd); }
      if(t.crop){                                    // pioneer roots cracking the crust
        feed += (t.feature==='saltflat'?0.5:0.75);
        t.crop.growth += CROPS[t.crop.type].growPerDay * Math.max(sn.growMult,0.5) * 0.8 * dd;
        if(t.crop.growth >= 1) harvestCrop(t, i);
      }
      if(t.graze){                                   // goats browsing the dead brush
        const g = t.graze;
        feed += 0.5 * (t.fence?1.5:1);
        g.days -= dd;
        if(g.days<=0){
          t.graze = null;
          agents = agents.filter(a=>a.tile!==i);
          if(t.deco){ t.deco = null; floater(i, '🐐 brush cleared!', '#e8d8a8'); }
          else floater(i, '🐐 browsed!', '#e8d8a8');
        }
      }
      if(feed>0){
        feed *= lvB;
        if(pondNear(t)) feed *= 1.3;                 // moisture helps amendments work
        SOIL_ATTRS.forEach(k=>{
          let d = feed;
          if(t.crop && (k==='om'||k==='microbial'||k==='erosion')) d *= 1.4;
          t.soil[k] = clamp(t.soil[k] + d*dd);
        });
      }
      recalc(t);
      const need = t.feature==='saltflat' ? 30 : 25;
      if(t.health >= need){                          // 🌅 the ground WAKES UP
        const wasSalt = t.feature==='saltflat';
        t.terrain = 'soil';
        if(t.feature==='saltflat' || t.feature==='gully' || t.feature==='swale') t.feature = null;
        state.stats.revived++;
        if(wasSalt) state.stats.saltRevived = (state.stats.saltRevived||0)+1;
        floater(i, '🌅 REVIVED!', '#ffe89a', 17);
        burst(i, '#c8f0a0', 14); ringAt(i, '#c8f0a0');
        SND.badge();
        tutEvent('revive');
      }
      return;
    }
    if(t.terrain!=='soil') return;
    // ---- grazing animals work the land over several days
    if(t.graze){
      const g = t.graze;
      const fm = t.fence ? 1.5 : 1;                  // paddock fences: rotational magic
      const apply = (rates, mult)=>{ SOIL_ATTRS.forEach(k=>{ t.soil[k] = clamp(t.soil[k] + rates[k]*(mult||1)*fm*dd); }); };
      if(g.kind==='team'){ apply(GRAZE.cattle.rates); apply(GRAZE.chicken.rates, SYNERGY_MULT); }
      else if(g.kind==='chicken') apply(GRAZE.chicken.rates, g.synergy?SYNERGY_MULT:1);
      else if(GRAZE[g.kind]) apply(GRAZE[g.kind].rates);
      g.days -= dd;
      if(g.days<=0){
        if(g.kind==='cattle' || g.kind==='team') t.sinceCattle = 0;
        t.graze = null;
        agents = agents.filter(a=>a.tile!==i);
        floater(i, '💚 grazed!', '#c8f0a0');
      }
    }else{
      t.sinceCattle = Math.min(999, t.sinceCattle+dd);
    }
    // ---- baseline regeneration / degradation per day
    // (kept gentle: nature heals slowly — the PLAYER's practices are the engine)
    let base = 0.05*sn.regenMult*lvB;
    if(!t.crop && !t.graze) base += 0.04;            // open land rests & recovers (slowly)
    base += 0.02*healthyNeighbors(t);                // life spreads outward
    base += f.bio/100*0.05;                          // a wilder farm heals itself
    if(t.compost>0){ base += 0.35; t.compost = Math.max(0, t.compost-dd); }
    const nearWorm = buildNear(t,'wormfarm',1), nearMush = buildNear(t,'mushroom',1);
    SOIL_ATTRS.forEach(k=>{
      let d = base;
      if(t.crop){
        const c = CROPS[t.crop.type];
        d = c.diverse ? 0.6*sn.regenMult*lvB : -0.12;   // diversity builds; mono extracts
        if((k==='om'||k==='microbial') && c.diverse) d *= 1.4;
        if(c.cover && (k==='om'||k==='microbial'||k==='erosion')) d *= 1.5;
        if(t.compost>0) d += 0.35;
      }
      if(k==='water' && pondNear(t)) d += 0.09;      // ponds, wells & tanks keep ground moist
      if(k==='erosion' && treeAdj(t)) d += 0.08;     // hedgerows shelter the soil
      if(k==='microbial' && treeAdj(t)) d += 0.03;
      if(k==='microbial' && nearWorm) d += 0.12;     // the worm army
      if((k==='om'||k==='microbial') && nearMush) d += 0.07;  // fungal threads
      t.soil[k] = clamp(t.soil[k] + d*dd);
    });
    // ---- crops grow live
    if(t.crop){
      const c = CROPS[t.crop.type];
      let gm = sn.growMult;
      if(buildNear(t,'greenhouse',2)) gm = Math.max(gm, 0.75) * 1.15;   // warmth all year
      if(state.unlocks.upg_growth) gm *= 1.2;
      t.crop.growth += c.growPerDay * gm * (0.65 + t.health/140) * dd;
      if(t.crop.growth >= 1) harvestCrop(t, i);
    }
    // ---- flowers drift with health
    if(t.health < 40) t.flowers = Math.max(0, t.flowers - 0.01*dd);
    else if(!t.crop && t.health > 60) t.flowers = Math.min(1, t.flowers + 0.005*dd);
    if(t.crop && CROPS[t.crop.type].cover && t.crop.growth>0.5) t.flowers = Math.min(1, t.flowers + 0.02*dd);
    recalc(t);
  });
  // ---- the river listens to the land (gentle drift toward the practice target)
  const wqTarget = computeWaterTarget();
  state.waterQuality = clamp(state.waterQuality + (wqTarget-state.waterQuality)*Math.min(1, 0.06*dd));
  // ---- calendar
  state.dayFrac += dd;
  while(state.dayFrac >= 1){
    state.dayFrac -= 1;
    state.day++;
    dailyIncome();
    updateQuests();
    if(state.day > DAYS_PER_SEASON){ state.day = 1; advanceSeason(); }
  }
  // periodic autosave + passive badge/win check (bio & health cross thresholds on their own)
  autosaveT += dt;
  if(autosaveT > 15){ autosaveT = 0; checkBadges(); save(); }
}
function harvestCrop(t, i){
  const c = CROPS[t.crop.type];
  const f = farmCache || farmStats();
  let mult = 0.4 + t.health/100;
  if(c.yield>0 && buildNear(t,'beehive',2)) mult *= 1.2;   // pollination bonus
  if(c.yield>0 && (f.b.silo||0)>0) mult *= 1.15;           // silo: stored & sold well
  const coins = Math.round(c.yield * mult);
  if(coins>0){
    state.coins += coins;
    state.stats.coinsEarned += coins;
    floater(i, '+🪙'+coins, '#ffd45e', 17);
    burst(i, '#ffd45e', 12);
    SND.coin();
  }else{
    floater(i, '🌼 soil fed!', '#fff2b0');
    burst(i, '#a8d5a8', 8);
  }
  state.stats.harvests++;
  t.soil.om = clamp(t.soil.om + (c.cover?6:3));
  t.soil.microbial = clamp(t.soil.microbial + (c.cover?4:1.5));
  if(c.pioneer && t.terrain==='dead'){   // a finished pioneer stand is a feast for dead ground
    t.soil.structure = clamp(t.soil.structure+5);
    t.soil.erosion = clamp(t.soil.erosion+5);
    t.soil.nutrients = clamp(t.soil.nutrients+4);
  }
  if(c.cover) t.flowers = Math.min(1, t.flowers+0.35);
  if(!c.diverse && Math.random()<0.35) toast('🌾 Quick Wheat paid fast… but that soil feels tired.');
  t.crop = null;
  recalc(t);
  checkBadges();
}
function advanceSeason(){
  state.season = (state.season+1)%4;
  if(state.season===0) state.year++;
  state.seasonCount++;
  const sn = SEASONS[state.season];
  toast(`${sn.emoji} ${sn.name} begins — Year ${state.year}`);
  SND.season();
  // perennials pay every season (except deep winter)
  if(state.season!==3){
    let per = 0;
    state.grid.forEach((t,i)=>{
      if(t.terrain==='orchard'){ per += 6; floater(i, '+🪙6 🍎', '#ffd45e', 13); }
      else if(t.terrain==='berrybush'){ per += 3; floater(i, '+🪙3 🫐', '#ffd45e', 12); }
    });
    if(per>0){ state.coins += per; state.stats.coinsEarned += per; SND.coin(); }
  }
  const ev = rollEvent();
  if(ev) setTimeout(()=>showEvent(ev), 800);
  checkBadges();
  save();
}

// ---------------------------------------------------------------- regions & quests
function regionProgress(reg){
  const g = reg.goal;
  let cur = 0;
  state.grid.forEach(t=>{
    if(t.region!==reg.id) return;
    const green = t.terrain==='trees' || t.terrain==='pond' || BUILD_SET.has(t.terrain);
    if(g.type==='healthy'){ if((isLandT(t) && t.health>=g.hp) || green) cur++; }
    else if(g.type==='alive'){ if(t.terrain==='soil' || green) cur++; }
    else if(g.type==='grove'){ if(t.terrain==='trees' || t.terrain==='orchard') cur++; }
  });
  return Math.min(cur, g.n);
}
function taskDef(id){ return TASKS.find(x=>x.id===id); }
function newTask(){
  const f = farmCache || farmStats();
  const active = new Set(state.tasks.map(x=>x.id));
  const pool = TASKS.filter(td=>{
    if(active.has(td.id)) return false;
    if(td.abs && (state.tasksDone[td.id] || td.abs(f))) return false;   // one-shot goals
    if(td.id==='build2' && !Object.keys(state.unlocks).some(u=>{
      const s = SHOP.find(x=>x.id===u); return s && s.cat==='Build';
    })) return false;
    return true;
  });
  if(!pool.length) return null;
  const td = pool[(Math.random()*pool.length)|0];
  return {id:td.id, base: td.stat ? (state.stats[td.stat]||0) : 0};
}
function updateQuests(){
  if(state.lv===LEVELS.length-1) updateValleyQuests();   // tasks & regions only on the finale
  checkLevelComplete();
  renderQuests();
}
function updateValleyQuests(){
  while(state.tasks.length<2){ const t = newTask(); if(!t) break; state.tasks.push(t); }
  const f = farmCache || farmStats();
  for(let k=state.tasks.length-1; k>=0; k--){
    const task = state.tasks[k], td = taskDef(task.id);
    if(!td){ state.tasks.splice(k,1); continue; }
    const done = td.abs ? td.abs(f) : ((state.stats[td.stat]||0) - task.base) >= td.n;
    if(done){
      state.tasks.splice(k,1);
      if(td.abs) state.tasksDone[td.id] = true;
      state.coins += td.reward;
      toast(`✅ ${td.em} ${td.desc} — +${td.reward}🪙!`);
      confetti(24); SND.badge();
    }
  }
  // ---- the current region's restore goal
  if(state.regionIdx < REGIONS.length){
    const reg = REGIONS[state.regionIdx];
    if(regionProgress(reg) >= reg.goal.n){
      state.regionIdx++;
      state.coins += reg.reward;
      confetti(90); SND.win();
      if(reg.id==='wash') restoreWash();
      const next = state.regionIdx < REGIONS.length ? REGIONS[state.regionIdx] : null;
      setTimeout(()=>showModal(`
        <h2>${reg.em} ${reg.name} Restored!</h2>
        <div class="eventbig">${reg.em}✨</div>
        <div class="eventkid">${reg.id==='wash' ? 'And listen… WATER! The dry creek is flowing again!' : 'Life is spreading back through '+reg.name+'.'}</div>
        <div class="eventlines"><div>🪙 +${reg.reward} restoration reward!</div></div>
        ${next ? `<div class="lesson">🎯 Next: <b>${next.name}</b> — ${next.story}</div>`
               : `<div class="lesson">🏆 Every region breathes again — now heal every last tile, clean the river, and welcome the wildlife home!</div>`}
        <div class="modalbtns"><button class="mbtn big" data-act="close">Onward! 🌱</button></div>`), 500);
      checkBadges(); save();
    }
  }
}
function restoreWash(){
  state.washRestored = true;
  state.grid.forEach((t,i)=>{
    if(t.terrain==='riverbed'){ t.terrain = 'water'; t.feature = null; burst(i, '#7fc4ee', 14); }
  });
  state.waterQuality = clamp(state.waterQuality + 5);
  SND.splash();
}
function renderQuests(){
  const regEl = document.getElementById('qRegion');
  const body = document.getElementById('qBody');
  if(!regEl || !body) return;
  // ---- campaign plots 1–4: the level's own goal checklist
  if(state.lv < LEVELS.length-1){
    const L = LV();
    regEl.textContent = L.name;
    let h = `<div class="qgoal">${L.em} ${L.goalText}</div>`;
    L.goals.forEach(g=>{
      const p = g.prog(), cur = Math.min(p[0], p[1]), n = p[1];
      h += `<div class="qtask ${cur>=n?'done':''}"><span class="qem">${cur>=n?'✅':g.em}</span><span>${g.desc}</span><span class="qprog">${cur}/${n}</span></div>`;
    });
    if(state.levelDone) h += `<div class="qtask done"><span class="qem">🏆</span><span>Plot complete! Keep tending, or head back to the 🗺️ Journey.</span></div>`;
    body.innerHTML = h;
    return;
  }
  let html = '';
  if(state.regionIdx >= REGIONS.length){
    regEl.textContent = 'The Living Valley';
    html = `<div class="qgoal">🏆 Every region restored! Heal every last tile & keep the river clean.</div>`;
  }else{
    const reg = REGIONS[state.regionIdx];
    regEl.textContent = reg.name;
    const cur = regionProgress(reg);
    html = `<div class="qgoal">${reg.em} ${reg.desc} <span style="color:var(--soft)">(${cur}/${reg.goal.n})</span></div>
      <div class="qbarw"><div class="qbar" style="width:${(cur/reg.goal.n*100).toFixed(0)}%"></div></div>`;
  }
  const f = farmCache || farmStats();
  state.tasks.forEach(task=>{
    const td = taskDef(task.id);
    if(!td) return;
    const n = td.abs ? 1 : td.n;
    const cur = td.abs ? (td.abs(f)?1:0) : Math.max(0, Math.min(td.n, (state.stats[td.stat]||0) - task.base));
    html += `<div class="qtask"><span class="qem">${td.em}</span><span>${td.desc}</span><span class="qprog">${td.abs?'':cur+'/'+n} +${td.reward}🪙</span></div>`;
  });
  body.innerHTML = html;
}

// ------------------------------------------------- campaign level completion
function checkLevelComplete(){
  if(!state || state.levelDone) return;
  const L = LV();
  if(!L.goals || !L.goals.length) return;
  for(const g of L.goals){ const p = g.prog(); if(p[0] < p[1]) return; }
  state.levelDone = true;
  camp.done[state.lv] = true;
  const f = farmCache || farmStats();
  const stars = 1 + (state.year<=L.parYears ? 1 : 0) + (f.avgHealth>=55 ? 1 : 0);
  camp.stars[state.lv] = Math.max(camp.stars[state.lv]||0, stars);
  if(state.lv < LEVELS.length-1) camp.unlocked = Math.max(camp.unlocked, state.lv+1);
  save();
  confetti(120); SND.win();
  const next = state.lv < LEVELS.length-1 ? LEVELS[state.lv+1] : null;
  setTimeout(()=>showModal(`
    <h2>${L.em} ${L.name} — Complete!</h2>
    <div class="eventbig">${'⭐'.repeat(stars)}</div>
    <div class="eventkid">${L.doneText}</div>
    <div class="winstats">Finished in <b>${state.year} year${state.year>1?'s':''}</b> · Farm Life ${Math.round(f.avgHealth)} · ${f.restored}/${f.totalSoil} tiles restored</div>
    ${next ? `<div class="lesson">🔓 Unlocked: <b>${next.em} ${next.name}</b> — ${next.teaser}</div>`
           : `<div class="lesson">🏆 You walked the whole journey — the land remembers you now.</div>`}
    <div class="modalbtns">
      ${next ? `<button class="mbtn big" data-act="nextlevel">Next: ${next.name} ▶</button>` : ''}
      <button class="mbtn wood" data-act="gojourney">🗺️ Journey</button>
      <button class="mbtn" data-act="close">Keep tending</button>
    </div>`), 700);
}

    else if(isLandT(t) && t.deco) did = ()=>{ t.deco = null; };

    else if(isLandT(t) && t.feature==='path') did = ()=>{ t.feature = null; };

    if(t.crop){ return false; }
    if(t.graze){ toast('The animals would trample the seedlings! 🐄'); return false; }
    let cost = td.cost;
    if(state.unlocks.upg_seeds) cost = Math.max(1, cost-1);

    t.crop = {type:tool, growth:0.05};

    if(tool==='covercrop'){ t.soil.om+=2; t.soil.microbial+=2; t.soil.erosion+=3.5; t.soil.structure+=1.5; }
    if(tool==='clover' || tool==='covercrop') state.stats.coverPlanted++;

    }else if(tool==='chicken'){
      const syn = t.sinceCattle <= 8;

      if(syn){ state.stats.synergy++; floater(i, '✨ following the herd!', '#ffe89a', 15); burst(i, '#ffd45e', 14); tutEvent('synergy'); }

  if(tool==='trees'){

    if(t.crop || t.graze){ toast('Clear this tile first! 🚜'); return false; }

  }
  if(tool==='fence'){

  if(BUILD_SET.has(tool)){

    if(tool==='orchard' && dead){ toast('💀 Fruit trees can\'t root in dead ground — feed it first!'); SND.uhoh(); return false; }

    const bWords = {market:'🏪 open for business!', silo:'🌾 grain store!', greenhouse:'🪴 warm glass!', beehive:'🐝 buzzing!',
      orchard:'🍎 orchard planted!', raintank:'🛢️ catching rain!', wetland:'🌾 wetland born!', stable:'🐴 neigh!',

      solar:'☀️ plugged in!', mushroom:'🍄 mycelium!', berrybush:'🫐 berries!'};
    floater(i, bWords[tool]||'built!', '#ffe0b0'); burst(i, '#e8c87a', 12); SND.place();

    if(tool==='wetland' && waterAdj(t)){

// ---------------------------------------------------------------- events
function rollEvent(){
  if(!LV().events) return null;          // gentle early plots: no surprise weather
  if(state.seasonCount < 2) return null;
  if(Math.random() > 0.45) return null;
  const anyCrop = state.grid.some(t=>t.crop);
  const anyMono = state.grid.some(t=>t.crop && !CROPS[t.crop.type].diverse);
  const deadCount = state.grid.filter(t=>t.terrain==='dead').length;
  const s = state.season;
  const pool = [];
  if(s===1){ pool.push('drought','drought','sunny','beeVisit','gift'); }
  if(s===0){ pool.push('downpour','gentleRain','beeVisit','gift'); if(anyCrop) pool.push('pests'); }
  if(s===2){ pool.push('downpour','gentleRain','gift'); if(anyCrop) pool.push('pests'); }
  if(s===3){ pool.push('snow','gift','snow'); }
  if(anyMono && s!==3) pool.push('pests');
  if(deadCount>40 && s!==3) pool.push('duststorm','duststorm');   // the dying land bites back
  if(!pool.length) return null;
  return pool[(Math.random()*pool.length)|0];
}
function showEvent(id){
  const f = farmStats();
  let em='', title='', kid='', lines=[], lesson='', bad=false;
  const soils = soilTiles();
  if(id==='drought'){
    bad=true; em='🌵'; title='Drought!'; kid='The sun blazed for weeks and the land got thirsty!';
    let prot=0;
    soils.forEach(t=>{
      const p = Math.min(0.85, t.soil.om/100*0.55 + (pondNear(t)?0.3:0) + ((t.crop&&CROPS[t.crop.type].diverse)?0.12:0) + t.flowers*0.05);
      t.soil.water = clamp(t.soil.water - 13*(1-p));
      if(t.crop) t.crop.growth = Math.max(0.05, t.crop.growth - 0.06*(1-p));
      if(p>0.4) prot++;
      recalc(t);
    });
    if(prot>0) lines.push(`💪 ${prot} tile${prot>1?'s':''} with spongy soil or a pond nearby held onto water!`);
    else lines.push('😟 The dry soil couldn\'t hold much water…');
    lesson='Soil full of organic matter soaks up rain like a sponge — and ponds share their water. Droughts can\'t beat a living farm.';
  }else if(id==='downpour'){
    bad=true; em='🌧️'; title='Heavy Rain!'; kid='A huge storm pounded the farm all night!';
    let bare=0, safe=0;
    soils.forEach(t=>{
      if(t.crop || t.soil.erosion>55 || treeAdj(t)){
        t.soil.water = clamp(t.soil.water+7); safe++;
      }else{
        t.soil.structure = clamp(t.soil.structure-5);
        t.soil.nutrients = clamp(t.soil.nutrients-4);
        t.soil.erosion   = clamp(t.soil.erosion-4);
        bare++;
      }
      recalc(t);
    });
    if(safe>0) lines.push(`🌿 ${safe} covered or tree-sheltered tile${safe>1?'s':''} drank the rain safely!`);
    if(bare>0) lines.push(`😟 ${bare} bare tile${bare>1?'s':''} lost some soil to the storm.`);
    // storms flush whatever the land can't hold straight into the river
    let buffers=0; state.grid.forEach(t2=>{ if(t2.terrain==='trees' && waterAdj(t2)) buffers++; });
    const wash = Math.max(0, (bare>0 ? 7 : 2) - buffers*2);
    if(wash>0){
      state.waterQuality = clamp(state.waterQuality - wash);
      lines.push('🟤 Muddy runoff washed into the river…');
    }else{
      lines.push('🌊 Your riverside buffers caught the runoff — the river stayed clean!');
    }
    lesson='Living roots, ground cover and hedgerows hold the soil tight when rain pounds down — and keep the mud out of the river.';
  }else if(id==='pests'){
    bad=true; em='🐛'; title='Pest Invasion!'; kid='Hungry bugs marched onto the farm!';
    let hit=0, safe=0;
    const guarded = f.bio>=45;
    soils.forEach(t=>{
      if(!t.crop) return;
      if(CROPS[t.crop.type].diverse || guarded) safe++;
      else{ t.crop.growth = Math.max(0.05, t.crop.growth-0.22); hit++; }
    });
    if(guarded) lines.push('🐞 Your ladybugs and birds gobbled the pests right up!');
    if(safe>0 && !guarded) lines.push(`🌽 ${safe} diverse tile${safe>1?'s':''} confused the bugs — no damage!`);
    if(hit>0) lines.push(`😟 ${hit} lonely crop${hit>1?'s':''} got munched…`);
    if(hit===0 && safe===0) lines.push('The bugs found nothing to eat and moved on!');
    lesson='A patchwork of different plants confuses pests — and wildlife eats them for free!';
  }else if(id==='duststorm'){
    bad=true; em='🌪️'; title='Dust Storm!'; kid='A wall of dust rolled off the dead flats and swallowed the sky!';
    let hit=0, safe=0;
    soils.forEach(t=>{
      if(t.crop || t.soil.erosion>50 || treeAdj(t)){ safe++; }
      else{
        t.soil.water = clamp(t.soil.water-6);
        t.soil.om = clamp(t.soil.om-3);
        t.soil.erosion = clamp(t.soil.erosion-3);
        hit++;
      }
      recalc(t);
    });
    if(safe>0) lines.push(`🌿 ${safe} covered tile${safe>1?'s':''} held tight against the wind!`);
    if(hit>0) lines.push(`😟 The storm scoured ${hit} bare tile${hit>1?'s':''}…`);
    lines.push('🏜️ Every DEAD tile you revive makes the storms weaker.');
    lesson='Bare, dead land feeds dust storms. Living roots and hedgerows pin the soil down — heal the land, calm the wind.';
  }else if(id==='gentleRain'){
    em='🌦️'; title='Gentle Rain'; kid='Soft rain fell for three cozy days.';
    soils.forEach(t=>{ t.soil.water = clamp(t.soil.water+8); recalc(t); });
    state.grid.forEach(t=>{   // rain even kisses the dead ground (it helps amendments work)
      if(t.terrain==='dead' && (t.compost>0 || t.crop)){ t.soil.water = clamp(t.soil.water+6); recalc(t); }
    });
    lines.push('💧 Every tile got a lovely drink.');
    lesson='Slow, gentle water is exactly what living soil loves best.';
  }else if(id==='sunny'){
    em='🌞'; title='Sunny Spell'; kid='A stretch of perfect sunshine!';
    let n=0;
    soils.forEach(t=>{ if(t.crop){ t.crop.growth = Math.min(0.99, t.crop.growth+0.12); n++; } });
    lines.push(n>0 ? `🌱 ${n} crop${n>1?'s':''} shot up in the sunshine!` : 'The open fields soaked up the warmth.');
    lesson='Sunshine is free energy — plants turn it into food for the whole soil web.';
  }else if(id==='gift'){
    em='🎁'; title='Neighborly Gift'; kid='A neighbor loved watching the farm come back — and left a gift!';
    state.coins += 10;
    lines.push('🪙 +10 coins! How kind!');
    lesson='Healthy farms inspire whole neighborhoods.';
  }else if(id==='beeVisit'){
    em='🐝'; title='Wandering Bees'; kid='A cloud of friendly bees buzzed through!';
    soils.forEach(t=>{ if(t.health>45) t.flowers = Math.min(1, t.flowers+0.1); });
    lines.push('🌼 They left extra wildflowers on your healthiest tiles.');
    lesson='Pollinators visit where flowers bloom — and help even more grow.';
  }else if(id==='snow'){
    em='☃️'; title='Snow Blanket'; kid='Thick fluffy snow tucked the whole farm in!';
    soils.forEach(t=>{ t.soil.water = clamp(t.soil.water+6); recalc(t); });
    lines.push('❄️ Melting snow means spring water for everyone.');
    lesson='Winter is not empty time — the soil rests and stores up for spring.';
  }else return;
  if(bad) SND.uhoh(); else SND.badge();
  showModal(`
    <h2>${em} ${title}</h2>
    <div class="eventbig">${em}</div>
    <div class="eventkid">${kid}</div>
    <div class="eventlines">${lines.map(l=>`<div>${l}</div>`).join('')}</div>
    <div class="lesson">🌱 ${lesson}</div>
    <div class="modalbtns"><button class="mbtn" data-act="close">OK!</button></div>
  `);
  checkBadges(); save(); updateHUD();
}
