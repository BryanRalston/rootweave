function buyHomestead(key){
  if(!key) return;
  const [kind, id] = key.split(':');
  const bank = camp.bank|0;
  const hs = camp.homestead;
  if(!Array.isArray(hs.improvements)) hs.improvements = [];
  const doneN = camp.done.filter(Boolean).length;
  if(kind==='house'){
    const tier = +id;
    const H = HS_HOUSE[tier];
    if(!H || tier!==(hs.houseTier|0)+1) return;
    if(doneN < H.needDone){ toast('🔒 Clear more campaign plots first.'); SND.uhoh(); return; }
    if(bank < H.cost){ toast(`Need 🪙${H.cost} in the bank.`); SND.uhoh(); return; }
    camp.bank -= H.cost;
    hs.houseTier = tier;
    // update live grid
    if(homesteadMode && state && state.grid){
      placeHouseOnTiles(state.grid, state.gridSize, tier);
      serializeHomesteadFromState();
    }else{
      ensureHomesteadTiles();
      placeHouseOnTiles(hs.tiles, hs.gridSize, tier);
    }
    houseUpgradeCeremony(H);
    save(); updateHUD(); openHomesteadCatalog('house');
    return;
  }
  if(kind==='imp'){
    const Imp = HS_IMPROVEMENTS.find(x=>x.id===id);
    if(!Imp) return;
    if(hsImpOwned(Imp.id)){ toast('Already owned!'); return; }
    if((hs.houseTier|0) < (Imp.needTier|0)){ toast(`🔒 Needs house tier ${Imp.needTier}+.`); SND.uhoh(); return; }
    if(doneN < (Imp.needDone|0)){ toast('🔒 Clear more campaign plots first.'); SND.uhoh(); return; }
    if(bank < Imp.cost){ toast(`Need 🪙${Imp.cost} in the bank.`); SND.uhoh(); return; }
    camp.bank -= Imp.cost;
    hs.improvements.push(Imp.id);
    if(Imp.id==='imp_gardenwing'){
      hs.expansions = hs.expansions || [];
      if(hs.expansions.indexOf('kit_garden') < 0) hs.expansions.push('kit_garden');
    }
    toast(`${Imp.em} ${Imp.name} added!`); confetti(28); SND.badge();
    save(); updateHUD(); openHomesteadCatalog('house');
    buildPalette();
    return;
  }
  if(kind==='exp'){
    const E = HS_EXPANSIONS.find(x=>x.id===id);
    if(!E) return;
    const isSize = !!E.size;
    const owned = isSize
      ? ((hs.expansions||[]).indexOf(E.id)>=0 || (hs.gridSize|0)>=E.size)
      : ((hs.expansions||[]).indexOf(E.id)>=0);
    if(owned){ toast('Already unlocked!'); return; }
    if(doneN < (E.needDone|0)){ toast('🔒 Clear more campaign plots first.'); SND.uhoh(); return; }
    if(bank < E.cost){ toast(`Need 🪙${E.cost} in the bank.`); SND.uhoh(); return; }
    camp.bank -= E.cost;
    hs.expansions = (hs.expansions||[]).concat([E.id]);
    if(isSize){
      // resize yard keeping existing tiles
      const oldSize = hs.gridSize|0;
      const oldTiles = (homesteadMode && state) ? state.grid : (hs.tiles||[]);
      const neu = buildHomesteadTiles(E.size, hs.houseTier|0);
      for(let r=0;r<oldSize;r++) for(let c=0;c<oldSize;c++){
        const o = oldTiles[r*oldSize+c];
        if(!o) continue;
        const n = neu[r*E.size+c];
        if(n) Object.assign(n, {terrain:o.terrain, deco:o.deco, feature:o.feature, fence:o.fence, flowers:o.flowers, soil:o.soil, health:o.health});
      }
      placeHouseOnTiles(neu, E.size, hs.houseTier|0);
      hs.gridSize = E.size;
      hs.tiles = neu;
      if(homesteadMode){
        state.grid = neu;
        state.gridSize = E.size;
        GRID = E.size;
        layout(); centerCamera();
      }
    }
    toast(`${E.em} ${E.name} unlocked!`); confetti(30); SND.badge();
    save(); updateHUD(); openHomesteadCatalog('expand');
    buildPalette();
    return;
  }
  if(kind==='tool'){
    const D = HS_CATALOG.find(x=>x.id===id);
    if(!D) return;
    if(!hsItemUnlocked(D)){ toast('🔒 Buy the matching kit under Expand first.'); SND.uhoh(); openHomesteadCatalog('expand'); return; }
    if(bank < D.cost){ toast(`Need 🪙${D.cost} in the bank.`); SND.uhoh(); return; }
    tool = D.id;
    closeModal();
    document.querySelectorAll('.tool').forEach(el=>el.classList.toggle('active', el.id==='tool_'+D.id));
    canvas.classList.toggle('tooling', true);
    toast(D.cost===0 ? `${D.em} ${D.name} — free place` : `${D.em} ${D.name} ready · 🪙${D.cost} each`);
    SND.pop();
    buildPalette();
  }
}
function houseUpgradeCeremony(H){
  if(!H) return;
  confetti(80);
  if(SND && typeof SND.badge==='function') SND.badge();
  let b = document.getElementById('hsUpgradeBanner');
  if(!b){
    b = document.createElement('div');
    b.id = 'hsUpgradeBanner';
    document.body.appendChild(b);
  }
  b.className = 'hs-up-banner show';
  b.innerHTML = `${H.em} <b>${H.name}</b> built!`;
  clearTimeout(b._t);
  b._t = setTimeout(()=> b.classList.remove('show'), 2200);
  toast(`${H.em} ${H.name} — dwelling upgraded!`);
}
function applyHomesteadTool(i){
  const t = state.grid[i];
  if(!t) return false;
  if(tool==='select'){
    selected = i; openInfo();
    ringAt(i, '#ffe89a'); SND.pop();
    if(t.terrain==='house' || t.terrain==='barn'){
      toast('🏡 Catalog → Expand kits & Yard Build. Rooms are optional (Peek Inside).');
    }
    return true;
  }
  if(tool==='bulldoze'){
    if(t.terrain==='house' || t.terrain==='barn'){ toast('That\'s your home! Upgrade it from 🛒 catalog.'); return false; }
    // free clear in homestead
    if(t.terrain!=='soil' || t.deco || t.fence){
      t.terrain = 'soil'; t.deco = null; t.feature = null; t.fence = false; t.crop = null;
      SOIL_ATTRS.forEach(k=>t.soil[k]=Math.max(t.soil[k], 60));
      recalc(t);
      floater(i, '🚜 cleared', '#e8dcc0'); SND.place();
      serializeHomesteadFromState(); save(); updateHUD();
      return true;
    }
    return false;
  }
  const D = HS_CATALOG.find(x=>x.id===tool);
  if(!D){ toast('Open 🛒 Catalog → Yard Build to pick a piece.'); return false; }
  if(!hsItemUnlocked(D)){ toast('🔒 Unlock that kit under Catalog → Expand.'); SND.uhoh(); return false; }
  if((camp.bank|0) < D.cost){ toast(`Bank needs 🪙${D.cost}.`); SND.uhoh(); return false; }
  if(t.terrain==='house' || t.terrain==='barn'){ toast('Leave the house footprint — build the yard around it.'); return false; }
  if(D.fence){
    if(t.fence) return false;
    camp.bank -= D.cost;
    t.fence = true;
    floater(i, D.em+' fence!', '#e8dcc0'); SND.place();
  }else if(D.path){
    if(t.terrain!=='soil' && t.terrain!=='dead'){ toast('Need open ground for a path.'); return false; }
    camp.bank -= D.cost;
    t.feature = 'path'; t.deco = null; t.crop = null;
    floater(i, '🪨 path!', '#d8c8a0'); SND.place();
  }else if(D.terrain){
    if(t.terrain!=='soil' && t.terrain!=='dead'){ toast('Clear this tile first.'); return false; }
    camp.bank -= D.cost;
    t.terrain = D.id; t.deco = null; t.feature = null; t.crop = null;
    floater(i, D.em+' placed!', '#c8f0a0'); SND.place();
  }else if(D.deco){
    if(t.terrain!=='soil' && t.terrain!=='dead'){ toast('Need open grass — clear this tile first.'); return false; }
    camp.bank -= D.cost;
    t.deco = D.id; t.crop = null;
    floater(i, D.em+' placed!', '#ffd9e8'); SND.place();
  }else return false;
  state.coins = camp.bank; // keep HUD in sync while viewing
  serializeHomesteadFromState();
  save(); updateHUD();
  return true;
}

function cotItem(id){ return COT_ITEMS.find(x=>x.id===id); }
function cotRoomDef(id){ return COT_ROOMS.find(r=>r.id===id) || COT_ROOMS[0]; }
/** Placement scale class multiplier (XL/L/M/S/XS/WALL via item.fit). */
function cotItemFitMul(item){
  if(!item) return 1;
  if(item.kind==='wall') return (typeof item.fit==='number' ? item.fit : 0.78);
  const f = item.fit;
  if(typeof f==='number') return f;
  return 1;
}
/** Room-relative size with depth perspective (lower on screen = larger). */
function cotPlaceSize(item, p, roomW){
  const base = Math.max(72, Math.min(220, roomW * 0.14));
  // Slightly stronger depth so front furniture reads larger than back wall
  const depth = 0.48 + 0.64 * Math.max(0.05, Math.min(0.95, (p && p.y) || 0.5));
  const mul = cotItemFitMul(item);
  let sz = Math.round(base * depth * mul);
  if(item && item.id==='cot-rug') sz = Math.round(sz * 1.15);
  if(item && item.kind==='wall') sz = Math.round(Math.max(56, roomW * 0.09 * mul));
  return Math.max(40, Math.min(260, sz));
}
/** Soft zone check for placement ghost validity. */
function cotPlacementValid(item, fracY){
  if(!item) return false;
  const y = fracY;
  if(item.kind==='wall') return y >= 0.12 && y <= 0.55;
  // floor + rugs
  return y >= 0.42 && y <= 0.92;
}
function ensureCotGhostEls(){
  const room = document.getElementById('cotRoom');
  if(!room) return {};
  let ghost = document.getElementById('cotGhost');
  let zone = document.getElementById('cotZoneHint');
  if(!ghost){
    ghost = document.createElement('div');
    ghost.id = 'cotGhost';
    ghost.setAttribute('aria-hidden','true');
    room.appendChild(ghost);
  }
  if(!zone){
    zone = document.createElement('div');
    zone.id = 'cotZoneHint';
    room.insertBefore(zone, room.firstChild);
  }
  return {ghost, zone, room};
}
function clearCotGhost(){
  const ghost = document.getElementById('cotGhost');
  const zone = document.getElementById('cotZoneHint');
  if(ghost){ ghost.style.display = 'none'; ghost.innerHTML = ''; ghost.className = ''; }
  if(zone){ zone.className = ''; zone.style.display = 'none'; }
}
function updateCotGhost(clientX, clientY){
  if(!cottageEdit || !cottagePending){ clearCotGhost(); return; }
  const {ghost, zone, room} = ensureCotGhostEls();
  if(!ghost || !room) return;
  const item = cotItem(cottagePending.id);
  if(!item){ clearCotGhost(); return; }
  const rect = room.getBoundingClientRect();
  const W = rect.width || 1, H = rect.height || 1;
  const fx = Math.max(0, Math.min(1, (clientX - rect.left) / W));
  const fy = Math.max(0, Math.min(1, (clientY - rect.top) / H));
  const isWall = item.kind==='wall';
  const valid = cotPlacementValid(item, fy);
  const size = cotPlaceSize(item, {x:fx, y:fy}, W);
  ghost.style.display = 'block';
  ghost.style.left = (fx * W) + 'px';
  ghost.style.top = (fy * H) + 'px';
  ghost.className = (isWall ? 'wall' : '') + (valid ? '' : ' invalid');
  ghost.innerHTML = cotItemArt(item, size);
  if(zone){
    zone.className = (isWall ? 'wall' : 'floor') + ' show' + (valid ? '' : ' bad');
    zone.style.display = 'block';
  }
}
function maybeCottageEmptyCoach(){
  if(cottageCoachShown || !cottageOpen) return;
  const rm = currentRoomState();
  if(!rm || (rm.placedItems && rm.placedItems.length)) return;
  cottageCoachShown = true;
  toast('🛋️ Buy Homestead Goods, then Arrange to place furniture.');
}
/** Photo furniture art when available; otherwise procedural SVG. */
function cotItemArt(item, size){
  if(!item) return '';
  const sz = size|0 || 40;
  if(item.img){
    const alt = String(item.name||'').replace(/"/g,'&quot;');
    return `<img src="${item.img}" alt="${alt}" width="${sz}" height="${sz}" style="max-width:${sz}px;max-height:${sz}px;width:auto;height:auto;object-fit:contain" loading="lazy"/>`;
  }
  return typeof item.svg==='function' ? item.svg(sz) : '';
}
function cotWallpaperFilter(wallId){
  return COT_WP_FILTERS[wallId] || 'none';
}
function preloadCottageInterior(){
  if(preloadCottageInterior._done) return;
  preloadCottageInterior._done = true;
  const urls = Object.values(COT_ROOM_PLATES);
  COT_ITEMS.forEach(it=>{ if(it.img) urls.push(it.img); });
  urls.forEach(src=>{ const im = new Image(); im.src = src; });
}
function houseTierNow(){ return Math.min(HS_HOUSE.length-1, Math.max(0, (camp.homestead && camp.homestead.houseTier)|0)); }
function roomUnlocked(roomId){
  const R = cotRoomDef(roomId);
  return houseTierNow() >= (R.needTier|0);
}
function cotItemFitsRoom(item, roomId){
  if(!item) return false;
  if(!item.rooms || !item.rooms.length) return true;
  return item.rooms.includes(roomId);
}
function ensureInterior(){
  if(!camp.homestead) camp.homestead = defaultHomestead();
  if(!camp.homestead.interior) camp.homestead.interior = defaultInterior();
  const inn = camp.homestead.interior;
  if(!inn.rooms || typeof inn.rooms!=='object') inn.rooms = {};
  // migrate legacy single-room save → living
  if(!inn.rooms.living && (Array.isArray(inn.placedItems) || inn.wallpaper || inn.flooring)){
    inn.rooms.living = {
      wallpaper: inn.wallpaper || 'wp-cream',
      flooring: inn.flooring || 'fl-wood',
      placedItems: Array.isArray(inn.placedItems) ? inn.placedItems.slice() : [],
    };
  }
  COT_ROOMS.forEach(R=>{
    if(!inn.rooms[R.id]) inn.rooms[R.id] = emptyRoomState(R.id);
    const rm = inn.rooms[R.id];
    if(!rm.wallpaper) rm.wallpaper = R.defaultWp;
    if(!rm.flooring) rm.flooring = R.defaultFl;
    if(!Array.isArray(rm.placedItems)) rm.placedItems = [];
  });
  if(!Array.isArray(inn.ownedItems)) inn.ownedItems = ['wp-cream','fl-wood'];
  if(!inn.ownedItems.includes('wp-cream')) inn.ownedItems.push('wp-cream');
  if(!inn.ownedItems.includes('fl-wood')) inn.ownedItems.push('fl-wood');
  const wpMap = { 'wp-sky':'wp-linen', 'wp-sunset':'wp-wheat', 'wp-night':'wp-barn' };
  inn.ownedItems = inn.ownedItems.map(id=>wpMap[id]||id).filter((id,i,a)=>a.indexOf(id)===i);
  Object.keys(inn.rooms).forEach(rid=>{
    const rm = inn.rooms[rid];
    if(wpMap[rm.wallpaper]) rm.wallpaper = wpMap[rm.wallpaper];
    if(!cotItem(rm.wallpaper)) rm.wallpaper = 'wp-cream';
    if(!cotItem(rm.flooring)) rm.flooring = 'fl-wood';
  });

  }else if(floorId==='fl-stone'){
    const tiles=[[0,0,90,55],[90,0,70,55],[160,0,100,55],[260,0,80,55],[340,0,95,55],[435,0,75,55],[510,0,90,55],[600,0,70,55],[670,0,100,55],[770,0,85,55],[855,0,90,55],[945,0,80,55],[1025,0,75,55],

  // Wall plaster texture + soft boards

  <line x1="871" y1="48" x2="871" y2="236" stroke="#3a2414" stroke-width="10"/>

  <rect x="708" y="240" width="326" height="18" rx="2" fill="#5c3a1e"/>

  ${curtainL}
  <ellipse cx="870" cy="${floorY+40}" rx="160" ry="28" fill="rgba(255,240,180,.14)"/>

  const hearthGlow = style==='hearth' ? `<ellipse cx="130" cy="${floorY+20}" rx="100" ry="30" fill="rgba(240,120,40,.1)"/>` : '';

  return `<svg class="cot-svg" viewBox="0 0 ${VW} ${VH}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

function renderRoomTabs(){
  const host = document.getElementById('cotRoomTabs');
  if(!host) return;
  const inn = ensureInterior();
  const tier = houseTierNow();
  host.innerHTML = COT_ROOMS.map(R=>{
    const unlocked = tier >= (R.needTier|0);
    const on = inn.currentRoom===R.id ? ' on' : '';
    const locked = unlocked ? '' : ' locked';
    const tip = unlocked ? R.desc : `Unlocks at house tier ${R.needTier}+`;
    return `<button type="button" class="cot-room-tab${on}${locked}" data-cotroom="${R.id}" title="${tip}">${R.em} ${R.name}</button>`;
  }).join('');
}
function switchCottageRoom(roomId){
  if(!roomUnlocked(roomId)){
    const R = cotRoomDef(roomId);
    toast(`🔒 ${R.name} unlocks at house tier ${R.needTier}+ (upgrade outside).`);
    SND.uhoh();
    return;
  }
  const inn = ensureInterior();
  inn.currentRoom = roomId;
  cottagePending = null;
  clearCotGhost();
  document.getElementById('cotRoom').classList.remove('cot-placing');

  const R = cotRoomDef(roomId);

  document.getElementById('cotTitle').textContent = `${R.em} ${R.name}`;
  renderRoomTabs();
  renderCottageRoom();
  renderCottageTray();
  save();
  SND.pop();
}
function enterCottage(){

function exitCottage(){

function renderCottageRoom(){
  const inn = ensureInterior();
  const rm = currentRoomState();
  const R = cotRoomDef(inn.currentRoom);
  const host = document.getElementById('cotSvgHost');
  const plate = COT_ROOM_PLATES[R.id] || COT_ROOM_PLATES[inn.currentRoom];
  if(plate){
    host.innerHTML = '';
    const img = document.createElement('img');
    img.className = 'cot-room-bg';
    img.src = plate;
    img.alt = R.name || 'Room';
    img.draggable = false;
    img.style.filter = cotWallpaperFilter(rm.wallpaper);
    img.onerror = ()=>{
      host.innerHTML = buildCottageRoomSVG(rm.wallpaper, rm.flooring, R.style);
    };
    host.appendChild(img);
  } else {
    host.innerHTML = buildCottageRoomSVG(rm.wallpaper, rm.flooring, R.style);
  }
  renderCottageItems();
  document.getElementById('cotBank').textContent = '🪙 '+(camp.bank|0);
  maybeCottageEmptyCoach();
}
function renderCottageItems(){
  const layer = document.getElementById('cotItems');
  const room = document.getElementById('cotRoom');
  if(!layer || !room) return;
  layer.innerHTML = '';
  const rect = room.getBoundingClientRect();
  const W = rect.width || 900, H = rect.height || 500;
  const rm = currentRoomState();
  const sorted = (rm.placedItems||[]).slice().sort((a,b)=>(a.z||0)-(b.z||0));
  sorted.forEach((p)=>{
    const item = cotItem(p.id);
    if(!item || (!item.svg && !item.img)) return;
    const origIdx = rm.placedItems.indexOf(p);
    const isWall = (p.kind||item.kind)==='wall';
    const isRug = item.id==='cot-rug' || item.kind==='rug';
    const size = cotPlaceSize(item, p, W);
    const el = document.createElement('div');
    const popCls = (origIdx === cottageLastPlaceIdx) ? ' pop' : '';
    el.className = 'cot-item'+(isWall?' wall':'')+(isRug?' rug':'')+popCls;
    el.style.left = (p.x*W)+'px';
    el.style.top = (p.y*H)+'px';
    // Front objects (higher y) cover back; walls sit above plate, below furniture stack
    el.style.zIndex = isWall
      ? (5 + Math.floor((p.y||0.3)*10))
      : (20 + Math.floor((p.y||0)*1000));
    el.dataset.idx = origIdx;
    const shadow = (!isWall && !isRug) ? `<div class="ci-shadow"></div>` : '';
    el.innerHTML = shadow + `<div class="ci-card">${cotItemArt(item, size)}</div>` +
      (cottageEdit ? `<button type="button" class="ci-rm" data-rm="${origIdx}" title="Remove">×</button>` : '');
    if(cottageEdit){
      el.addEventListener('pointerdown', (e)=>{
        if(e.target.closest('.ci-rm')) return;
        e.preventDefault(); e.stopPropagation();
        el.setPointerCapture(e.pointerId);
        cottageDrag = {idx:origIdx, ox:e.clientX, oy:e.clientY, px:p.x, py:p.y};
      });
    }
    layer.appendChild(el);
  });
  if(cottageLastPlaceIdx >= 0){
    // pop class is one-shot
    const last = cottageLastPlaceIdx;
    cottageLastPlaceIdx = -1;
    setTimeout(()=>{
      const el = layer.querySelector(`[data-idx="${last}"]`);
      if(el) el.classList.remove('pop');
    }, 140);
  }
}
function renderCottageTray(){
  const tray = document.getElementById('cotTray');
  if(!tray) return;
  const inn = ensureInterior();
  const roomId = inn.currentRoom;
  const placeables = COT_ITEMS.filter(i=>
    (i.kind==='floor'||i.kind==='wall') && inn.ownedItems.includes(i.id) && cotItemFitsRoom(i, roomId));
  // also show owned items that don't fit, grayed? better: show fits first, then "other" section
  const others = COT_ITEMS.filter(i=>
    (i.kind==='floor'||i.kind==='wall') && inn.ownedItems.includes(i.id) && !cotItemFitsRoom(i, roomId));
  if(!placeables.length && !others.length){
    tray.innerHTML = `<div class="cot-tray-item" style="width:auto;padding:8px 14px;opacity:.7">Buy goods in the shop, then place them here.</div>`;
    return;
  }
  const mk = (i, dim)=>{
    const on = cottagePending && cottagePending.id===i.id ? ' on' : '';
    return `<button type="button" class="cot-tray-item${on}" data-cotplace="${i.id}" style="${dim?'opacity:.55':''}">
      <div>${cotItemArt(i, 44)}</div><div class="tt">${i.name}</div></button>`;
  };
  tray.innerHTML = placeables.map(i=>mk(i,false)).join('') + others.map(i=>mk(i,true)).join('');
}
function setCottageEdit(on){
  cottageEdit = !!on;

  clearCotGhost();
  const el = document.getElementById('cottage');
  el.classList.toggle('cot-edit', cottageEdit);
  document.getElementById('cotEditBtn').style.display = cottageEdit ? 'none' : '';
  document.getElementById('cotDoneBtn').style.display = cottageEdit ? '' : 'none';

function openCottageShop(tab){
  ensureInterior();
  const t = tab || cottageShopTab || 'furniture';
  cottageShopTab = t;
  const inn = ensureInterior();
  const rm = currentRoomState();
  const roomId = inn.currentRoom;
  const R = cotRoomDef(roomId);
  const bank = camp.bank|0;
  const tabs = [
    ['furniture','🪑 Furniture'],['decor','🧺 Decor'],['wall','🖼️ Wall'],['style','🪵 Finish']
  ].map(([k,lab])=>`<button class="shoptab ${k===t?'on':''}" data-cotshop="${k}">${lab}</button>`).join('');
  let list = [];
  if(t==='furniture') list = COT_ITEMS.filter(i=>i.cat==='furniture');
  else if(t==='decor') list = COT_ITEMS.filter(i=>i.cat==='decor');
  else if(t==='wall') list = COT_ITEMS.filter(i=>i.cat==='wall');
  else list = COT_ITEMS.filter(i=>i.kind==='wallpaper'||i.kind==='flooring');
  // sort: room-fit first
  list = list.slice().sort((a,b)=>{
    const af = cotItemFitsRoom(a, roomId)?0:1;
    const bf = cotItemFitsRoom(b, roomId)?0:1;
    return af-bf || a.cost-b.cost;
  });
  const body = list.map(i=>{
    const owned = inn.ownedItems.includes(i.id);
    const active = (i.kind==='wallpaper' && rm.wallpaper===i.id) || (i.kind==='flooring' && rm.flooring===i.id);
    const can = !owned && bank>=i.cost;
    let status = owned ? (active?'✓ in room':(i.kind==='wallpaper'||i.kind==='flooring'?'✓ owned':'✓ owned')) : (i.cost===0?'free':'🪙'+i.cost);
    const act = i.kind==='wallpaper'||i.kind==='flooring'
      ? (owned ? `data-cotapply="${i.id}"` : `data-cotbuy="${i.id}"`)
      : `data-cotbuy="${i.id}"`;
    const dis = (!owned && !can && i.cost>0) ? 'disabled' : '';
    const roomHint = i.rooms && i.rooms.length
      ? i.rooms.map(rid=>{ const x=cotRoomDef(rid); return x?x.em:''; }).join('')
      : '🏠';
    const fit = cotItemFitsRoom(i, roomId);
    return `<div class="shopitem ${owned?'owned':''}" style="${fit?'':'opacity:.75'}">
      <div class="sem" style="width:48px">${cotItemArt(i, 44)}</div>
      <div><div class="snm">${i.name}</div><div class="sds">${i.desc}</div><div class="srm">${roomHint} ${fit?'fits here':'any room'}</div></div>
      <button class="shopbuy" ${act} ${dis}>${status}</button>
    </div>`;
  }).join('');
  showModal(`
    <h2>🛒 Homestead Goods</h2>
    <div class="sub">${R.em} <b>${R.name}</b> · bank 🪙 <b>${bank}</b> · finishes apply to this room</div>
    <div class="shoptabs">${tabs}</div>
    <div class="cot-shop-grid">${body}</div>
    <div class="modalbtns"><button class="mbtn" data-act="close">Back</button></div>
  `);
}
function buyCottageItem(id){
  const item = cotItem(id);
  if(!item) return;
  const inn = ensureInterior();
  const rm = currentRoomState();
  if(inn.ownedItems.includes(id)){
    if(item.kind==='wallpaper'){ rm.wallpaper = id; syncInteriorLegacy(inn); renderCottageRoom(); save(); openCottageShop('style'); toast('Wallpaper set for this room!'); return; }
    if(item.kind==='flooring'){ rm.flooring = id; syncInteriorLegacy(inn); renderCottageRoom(); save(); openCottageShop('style'); toast('Flooring set for this room!'); return; }
    return;
  }
  if((camp.bank|0) < item.cost){ toast(`Need 🪙${item.cost} in the bank.`); SND.uhoh(); return; }
  camp.bank -= item.cost;
  inn.ownedItems.push(id);
  if(item.kind==='wallpaper') rm.wallpaper = id;
  if(item.kind==='flooring') rm.flooring = id;
  syncInteriorLegacy(inn);
  toast(`🛍️ ${item.name} unlocked!`); SND.badge(); confetti(20);
  save();
  if(cottageOpen){ document.getElementById('cotBank').textContent = '🪙 '+(camp.bank|0); renderCottageRoom(); renderCottageTray(); }
  openCottageShop(item.cat==='wall'?'wall':item.cat==='decor'?'decor':(item.kind==='wallpaper'||item.kind==='flooring')?'style':'furniture');
}
function applyCottageStyle(id){
  const item = cotItem(id);
  const inn = ensureInterior();
  const rm = currentRoomState();
  if(!item || !inn.ownedItems.includes(id)) return;
  if(item.kind==='wallpaper') rm.wallpaper = id;
  if(item.kind==='flooring') rm.flooring = id;
  syncInteriorLegacy(inn);
  renderCottageRoom(); save(); openCottageShop('style'); SND.pop();
}
function placeCottageAt(fracX, fracY){
  if(!cottagePending) return;
  const inn = ensureInterior();
  const rm = currentRoomState();
  const item = cotItem(cottagePending.id);
  if(!item) return;
  let x = Math.max(0.05, Math.min(0.95, fracX));
  let y = Math.max(0.08, Math.min(0.92, fracY));
  // Soft clamp into photo-room zones: wall strip vs floor zone
  if(item.kind==='wall'){
    y = Math.max(0.12, Math.min(0.55, y));
  } else if(item.kind==='floor'){
    y = Math.max(0.42, Math.min(0.92, y));
  }
  const z = 1 + rm.placedItems.length;
  rm.placedItems.push({id:item.id, kind:item.kind, x, y, z});
  cottageLastPlaceIdx = rm.placedItems.length - 1;
  cottagePending = null;
  clearCotGhost();
  syncInteriorLegacy(inn);
  document.getElementById('cotRoom').classList.remove('cot-placing');
  renderCottageTray(); renderCottageItems(); save(); SND.place();
  toast(`${item.name} placed!`);
}
function removeCottageItem(idx){
  const inn = ensureInterior();
  const rm = currentRoomState();
  if(idx<0 || idx>=rm.placedItems.length) return;
  const p = rm.placedItems[idx];
  const item = cotItem(p.id);
  // refund only when last copy of this id is removed from ALL rooms
  if(item && item.cost>0){
    let count = 0;
    Object.keys(inn.rooms).forEach(rid=>{
      (inn.rooms[rid].placedItems||[]).forEach(pi=>{ if(pi.id===p.id) count++; });
    });
    // after splice we'll have count-1; if 0 remaining and still owned, keep owned (catalog stays)
    // half refund only for removing the placement, not the unlock — keep half refund for placement
    camp.bank += Math.floor(item.cost*0.25);
  }
  rm.placedItems.splice(idx,1);
  syncInteriorLegacy(inn);
  document.getElementById('cotBank').textContent = '🪙 '+(camp.bank|0);
  renderCottageItems(); save(); SND.pop();
}
function initCottageUI(){
  document.getElementById('cotBack').addEventListener('click', ()=>{ exitCottage(); });
  document.getElementById('cotEditBtn').addEventListener('click', ()=>{ setCottageEdit(true); SND.pop(); });
  document.getElementById('cotDoneBtn').addEventListener('click', ()=>{ setCottageEdit(false); SND.pop(); });
  document.getElementById('cotShopBtn').addEventListener('click', ()=>{ openCottageShop('furniture'); SND.pop(); });
  document.getElementById('cotRoomTabs').addEventListener('click', e=>{
    const b = e.target.closest('[data-cotroom]');
    if(b) switchCottageRoom(b.dataset.cotroom);
  });
  document.getElementById('cotTray').addEventListener('click', e=>{
    const b = e.target.closest('[data-cotplace]');
    if(!b) return;
    cottagePending = {id:b.dataset.cotplace};
    document.getElementById('cotRoom').classList.add('cot-placing');
    renderCottageTray();
    toast('Tap a spot in the room to place it.');
    SND.pop();
  });
  document.getElementById('cotItems').addEventListener('click', e=>{
    const rm = e.target.closest('[data-rm]');
    if(rm){ removeCottageItem(+rm.dataset.rm); e.stopPropagation(); }
  });
  const room = document.getElementById('cotRoom');
  room.addEventListener('pointerdown', e=>{
    if(!cottageEdit || !cottagePending) return;
    if(e.target.closest('.cot-item')) return;
    const rect = room.getBoundingClientRect();
    placeCottageAt((e.clientX-rect.left)/rect.width, (e.clientY-rect.top)/rect.height);
  });
  room.addEventListener('pointermove', e=>{
    if(!cottageEdit || !cottagePending || cottageDrag) return;
    updateCotGhost(e.clientX, e.clientY);
  });
  room.addEventListener('pointerleave', ()=>{
    if(cottagePending) clearCotGhost();
  });
  window.addEventListener('pointermove', e=>{
    if(cottageDrag){
      const rm = currentRoomState();
      const p = rm.placedItems[cottageDrag.idx];
      if(!p) return;
      const roomEl = document.getElementById('cotRoom');
      const rect = roomEl.getBoundingClientRect();
      const dx = (e.clientX - cottageDrag.ox) / rect.width;
      const dy = (e.clientY - cottageDrag.oy) / rect.height;
      p.x = Math.max(0.05, Math.min(0.95, cottageDrag.px + dx));
      p.y = Math.max(0.08, Math.min(0.92, cottageDrag.py + dy));
      renderCottageItems();
      return;
    }
    if(cottageEdit && cottagePending && cottageOpen){
      const roomEl = document.getElementById('cotRoom');
      if(!roomEl) return;
      const rect = roomEl.getBoundingClientRect();
      if(e.clientX>=rect.left && e.clientX<=rect.right && e.clientY>=rect.top && e.clientY<=rect.bottom){
        updateCotGhost(e.clientX, e.clientY);
      }
    }
  });
  window.addEventListener('pointerup', ()=>{
    if(cottageDrag){ cottageDrag = null; save(); }
  });
}

// ---------------------------------------------------------------- tools
function toolDef(id){ return TOOLS.find(t=>t.id===id); }
// Homestead catalog tools are NOT in TOOLS — pointer path must still place them.
function isYardTool(id){
  if(!homesteadMode) return false;
  if(id==='select' || id==='bulldoze') return true;
  return HS_CATALOG.some(h=>h.id===id);
}
function toolPaints(id){
  if(homesteadMode){
    if(id==='select') return false;
    if(id==='bulldoze') return true;
    if(HS_CATALOG.some(h=>h.id===id)) return true;
  }
  const td = toolDef(id);
  return !!(td && td.paint);
}
function spend(cost){
  if(homesteadMode){
    if((camp.bank|0) < cost){ toast(`Not enough banked coins! Need 🪙${cost}.`); SND.uhoh(); return false; }
    camp.bank -= cost;
    state.coins = camp.bank;
    return true;
  }
  if(state.coins < cost){ toast(`Not enough coins! Need 🪙${cost}. Harvest crops to earn more.`); SND.uhoh(); return false; }
  state.coins -= cost;
  return true;
}
const AGENT_SPEED = {cow:0.05, chicken:0.11, sheep:0.055, goat:0.075, pig:0.06, duckT:0.085, horse:0.04};
function spawnAnimals(i, kind, n){
  for(let k=0;k<n;k++){
    agents.push({tile:i, kind, u:0.25+Math.random()*0.5, v:0.25+Math.random()*0.5,
      tu:0.15+Math.random()*0.7, tv:0.15+Math.random()*0.7, speed:(AGENT_SPEED[kind]||0.08)+Math.random()*0.03, phase:Math.random()*6.28});
  }
}
// returns true if the tool did something (used for paint-drag)
const DECO_CYCLE = ['deco_haybales','deco_flowerbed','deco_scarecrow','deco_cart','deco_signpost','deco_stonewall','deco_lamp','deco_gate'];
let decoIdx = 0;
function applyTool(i){
  if(homesteadMode) return applyHomesteadTool(i);
  const t = state.grid[i];
  const td = toolDef(tool);
  if(!t || !td) return false;
  const GRAZE_TOOLS = {cattle:'cow', chicken:'chicken', sheep:'sheep', goat:'goat', pig:'pig', duckT:'duckT'};
  if(tool==='select'){
    selected = i; openInfo();
    ringAt(i, '#ffe89a'); SND.pop();
    return true;
  }
  if(t.terrain==='barn' || t.terrain==='coop'){ toast('That\'s the farmstead! 🏠'); return false; }
  if(t.terrain==='riverbed'){ toast(state.lv===LEVELS.length-1 ? '🏜️ A dry creekbed… revive the land of the Dry Wash and the water will come back!' : '🏜️ A dry creekbed — water once ran here. Heal the land around it!'); return false; }
  if(t.terrain==='water'){
    if(tool==='bridge'){
      if(t.bridge) return false;
      if(!spend(td.cost)) return false;
      t.bridge = true;
      state.stats.buildings++;
      floater(i, '🌉 bridge!', '#e8dcc0'); SND.place();
      afterBuild(); return true;
    }
    if(tool==='bulldoze' && t.bridge){
      if(!spend(td.cost)) return false;
      t.bridge = false;
      floater(i, '🚜 cleared', '#e8dcc0'); SND.place();
      afterBuild(); return true;
    }
    toast('The river flows here! 🌊 Plant 🌳 trees BESIDE it to filter the runoff.');
    return false;
  }
  if(tool==='bridge'){ toast('🌉 Bridges go ON the river!'); return false; }
  if(tool==='bulldoze'){
    let did = null;
    if(isLandT(t) && t.crop) did = ()=>{ t.crop = null; };
    else if(isLandT(t) && t.graze) did = ()=>{ t.graze = null; agents = agents.filter(a=>a.tile!==i); };
    else if(isLandT(t) && t.deco) did = ()=>{ t.deco = null; };
    else if(isLandT(t) && t.fence) did = ()=>{ t.fence = false; };
    else if(isLandT(t) && t.feature==='path') did = ()=>{ t.feature = null; };
    else if(t.terrain==='pond' || t.terrain==='trees') did = ()=>{ t.terrain = 'soil'; };
    else if(BUILD_SET.has(t.terrain)) did = ()=>{ t.terrain = 'soil'; agents = agents.filter(a=>a.tile!==i); };
    if(!did){ toast('Nothing to clear here.'); return false; }
    if(!spend(td.cost)) return false;
    did();
    floater(i, '🚜 cleared', '#e8dcc0'); burst(i, '#c9b896', 8); SND.place();
    afterBuild(); return true;
  }
  if(!isLandT(t)){ toast(isWaterT(t) ? 'That\'s water! 💧' : t.terrain==='trees' ? 'Trees live here! 🌳' : 'Something is already built here! 🏗️'); return false; }
  const dead = t.terrain==='dead';
  // ======== THE REMEDIATION GATE: dead ground rejects productive crops ========
  if(tool==='sisters' || tool==='wheat'){
    if(dead){
      if(!state.deadTip){ state.deadTip = true; }
      toast('💀 This ground is DEAD — feed it first! Try 🪣 compost or 🌿 pioneer plants.');
      ringAt(i, '#c98a3d'); SND.uhoh();
      return false;
    }
  }
  if(tool==='sisters' || tool==='wheat' || tool==='clover' || tool==='covercrop'){
    const canWinter = buildNear(t,'greenhouse',2);
    if(!SEASONS[state.season].canPlant && !canWinter){ toast('❄️ Too cold to plant! Wait for spring — or build a 🪴 greenhouse.'); ringAt(i, '#8ec5e8'); return false; }
    if(t.crop){ return false; }
    if(t.graze){ toast('The animals would trample the seedlings! 🐄'); ringAt(i, '#e06666'); return false; }
    let cost = td.cost;
    if(state.unlocks.upg_seeds) cost = Math.max(1, cost-1);
    if(!spend(cost)) return false;
    t.crop = {type:tool, growth:0.05};
    if(tool==='sisters'){ t.soil.om+=3.5; t.soil.nutrients+=3.5; t.soil.microbial+=2.5; t.soil.water+=1; state.stats.sistersPlanted++; }
    if(tool==='clover'){ t.soil.om+=2.5; t.soil.microbial+=3; t.soil.erosion+=3; }
    if(tool==='covercrop'){ t.soil.om+=2; t.soil.microbial+=2; t.soil.erosion+=3.5; t.soil.structure+=1.5; }
    if(tool==='clover' || tool==='covercrop') state.stats.coverPlanted++;
    SOIL_ATTRS.forEach(k=>t.soil[k]=clamp(t.soil[k]));
    recalc(t);
    state.stats.planted++;
    floater(i, CROPS[tool].em+' planted!', dead?'#e8d8a8':'#dff7c8');
    burst(i, dead?'#c9b896':'#8fce6e', 8); SND.pop();
    if(dead && !state.deadTip2){ state.deadTip2 = true; toast('🌿 Pioneer roots are cracking the dead crust — watch it wake up!'); }
    if(dead) tutEvent('feed_dead');
    if(!dead && (tool==='sisters' || tool==='wheat')) tutEvent('plant_crop');
    afterBuild(); return true;
  }
  if(GRAZE_TOOLS[tool]){
    if(dead && tool!=='goat'){
      toast(toolAllowed('goat') ? '💀 Nothing to eat on dead ground… only 🐐 goats can browse this scrub!'
                                : '💀 Nothing to eat on dead ground — feed it first with 🪣 or 🌿!');
      ringAt(i, '#c98a3d'); SND.uhoh();
      return false;
    }
    if(t.crop){ toast('The animals would munch your crop! 🌽'); ringAt(i, '#e06666'); SND.uhoh(); return false; }
    if(tool==='chicken'){
      if(t.graze && (t.graze.kind==='chicken' || t.graze.kind==='team')) return false;
    }else if(t.graze){ return false; }
    if(!spend(td.cost)) return false;
    if(tool==='chicken' && t.graze && t.graze.kind==='cattle'){
      t.graze.kind = 'team';
      t.graze.days = Math.max(t.graze.days, GRAZE.chicken.days);
      t.graze.synergy = true;
      state.stats.synergy++;
      floater(i, '✨ Team graze!', '#ffe89a', 17); burst(i, '#ffd45e', 16);
      tutEvent('synergy');
    }else if(tool==='chicken'){
      const syn = t.sinceCattle <= 8;
      t.graze = {kind:'chicken', days:GRAZE.chicken.days, total:GRAZE.chicken.days, synergy:syn};
      if(syn){ state.stats.synergy++; floater(i, '✨ following the herd!', '#ffe89a', 15); burst(i, '#ffd45e', 14); tutEvent('synergy'); }
      else floater(i, '🐔 scratching!', '#ffe0b0');
    }else{
      const g = GRAZE[tool];
      t.graze = {kind:tool, days:g.days, total:g.days, synergy:false};
      const words = {cattle:'🐄 mob grazing!', sheep:'🐑 mowing!', goat:'🐐 browsing!', pig:'🐖 tilling!', duckT:'🦆 on patrol!'};
      floater(i, words[tool], '#ffe0b0');
    }
    if(tool==='cattle') state.stats.cattle++;
    if(tool==='chicken') state.stats.chickens++;
    state.stats.grazes++;
    spawnAnimals(i, GRAZE_TOOLS[tool], tool==='chicken'?3 : tool==='duckT'?3 : 2);
    if(tool==='cattle'){ SND.moo(); tutEvent('graze_cattle'); }
    else if(tool==='chicken'){ SND.cluck(); }
    else SND.place();
    if(tool==='goat') tutEvent('graze_goat');
    afterBuild(); return true;
  }
  if(tool==='pond'){
    if(t.crop || t.graze){ toast('Clear this tile first! 🚜'); return false; }
    if(!spend(td.cost)) return false;
    t.terrain = 'pond'; t.flowers = 0; t.deco = null; t.feature = null;
    state.stats.ponds++;
    floater(i, '💧 pond dug!', '#bfe3ff'); burst(i, '#7fc4ee', 14); SND.splash();
    afterBuild(); return true;
  }
  if(tool==='trees'){
    if(dead){ toast('💀 Saplings can\'t root in dead ground — feed it first with 🪣 or 🌿!'); SND.uhoh(); return false; }
    if(t.crop || t.graze){ toast('Clear this tile first! 🚜'); return false; }
    if(!spend(td.cost)) return false;
    t.terrain = 'trees'; t.flowers = Math.min(1, t.flowers+0.3); t.deco = null;
    state.stats.trees++;
    floater(i, '🌳 hedgerow!', '#c8f0a0'); burst(i, '#6fae5f', 12); SND.place();
    if(waterAdj(t)){
      // riparian buffer! the key clean-water move — make cause→effect obvious
      state.waterQuality = clamp(state.waterQuality + 4);
      state.stats.buffers++;
      tutEvent('buffer');
      setTimeout(()=>floater(i, '💧 riparian buffer!', '#bfe3ff', 16), 350);
      ringAt(i, '#7fd4f0');
      if(!state.riparianTip){
        state.riparianTip = true;
        setTimeout(()=>toast('🌳 Buffer roots filter runoff before it reaches the river — water quality rising!'), 600);
      }
    }
    afterBuild(); return true;
  }
  if(tool==='compost'){
    if(t.compost > 5){ return false; }
    const cost = state.unlocks.upg_compost ? 2 : td.cost;
    if(!spend(cost)) return false;
    t.compost = state.unlocks.upg_compost ? 14 : 10;
    state.stats.composts++;
    floater(i, '🪣 +compost', '#d8c8a0'); burst(i, '#9a7d54', 10); SND.place();
    if(dead && !state.deadTip2){ state.deadTip2 = true; toast('🪣 Food for the dead ground — keep feeding and it will wake!'); }
    if(dead) tutEvent('feed_dead');
    afterBuild(); return true;
  }
  if(tool==='fence'){
    if(t.fence) return false;
    if(!spend(td.cost)) return false;
    t.fence = true;
    floater(i, '🚧 paddock!', '#e8dcc0'); SND.place();
    afterBuild(); return true;
  }
  if(tool==='decor'){
    if(t.crop || t.graze){ toast('Clear this tile first! 🚜'); return false; }
    if(!spend(td.cost)) return false;
    t.deco = DECO_CYCLE[decoIdx % DECO_CYCLE.length];
    decoIdx++;
    state.stats.decos++;
    floater(i, '🎀 cozy!', '#ffd9e8'); SND.place();
    afterBuild(); return true;
  }
  if(BUILD_SET.has(tool)){
    if(t.crop || t.graze){ toast('Clear this tile first! 🚜'); return false; }
    if(tool==='wetland' && dead){ toast('💀 Wetland plants need living ground — revive this tile first!'); SND.uhoh(); return false; }
    if(tool==='orchard' && dead){ toast('💀 Fruit trees can\'t root in dead ground — feed it first!'); SND.uhoh(); return false; }
    if(!spend(td.cost)) return false;
    t.terrain = tool; t.deco = null; t.feature = null; t.crop = null;
    state.stats.buildings++;
    const bWords = {market:'🏪 open for business!', silo:'🌾 grain store!', greenhouse:'🪴 warm glass!', beehive:'🐝 buzzing!',
      orchard:'🍎 orchard planted!', raintank:'🛢️ catching rain!', wetland:'🌾 wetland born!', stable:'🐴 neigh!',
      wormfarm:'🪱 worm army!', birdhouse:'🐦 new tenants!', well:'⛲ sweet water!', windmill:'🌬️ spinning!',
      solar:'☀️ plugged in!', mushroom:'🍄 mycelium!', berrybush:'🫐 berries!'};
    floater(i, bWords[tool]||'built!', '#ffe0b0'); burst(i, '#e8c87a', 12); SND.place();
    if(tool==='stable') spawnAnimals(i, 'horse', 1);
    if(tool==='wetland' && waterAdj(t)){
      state.waterQuality = clamp(state.waterQuality + 5);
      setTimeout(()=>floater(i, '💧 filtering the river!', '#bfe3ff', 15), 350);
    }
    afterBuild(); return true;
  }
  return false;
}

// ---------------------------------------------------------------- events
function rollEvent(){
  if(!LV().events) return null;          // gentle early plots: no surprise weather
  if(state.seasonCount < 2) return null;
  if(Math.random() > 0.45) return null;
  const anyCrop = state.grid.some(t=>t.crop);
  const anyMono = state.grid.some(t=>t.crop && !CROPS[t.crop.type].diverse);
  const deadCount = state.grid.filter(t=>t.terrain==='dead').length;
  const s = state.season;
  const pool = [];
  if(s===1){ pool.push('drought','drought','sunny','beeVisit','gift'); }
  if(s===0){ pool.push('downpour','gentleRain','beeVisit','gift'); if(anyCrop) pool.push('pests'); }
  if(s===2){ pool.push('downpour','gentleRain','gift'); if(anyCrop) pool.push('pests'); }
  if(s===3){ pool.push('snow','gift','snow'); }
  if(anyMono && s!==3) pool.push('pests');
  if(deadCount>40 && s!==3) pool.push('duststorm','duststorm');   // the dying land bites back
  if(!pool.length) return null;
  return pool[(Math.random()*pool.length)|0];
}
function showEvent(id){
  const f = farmStats();
  let em='', title='', kid='', lines=[], lesson='', bad=false;
  const soils = soilTiles();
  if(id==='drought'){
    bad=true; em='🌵'; title='Drought!'; kid='The sun blazed for weeks and the land got thirsty!';
    let prot=0;
    soils.forEach(t=>{
      const p = Math.min(0.85, t.soil.om/100*0.55 + (pondNear(t)?0.3:0) + ((t.crop&&CROPS[t.crop.type].diverse)?0.12:0) + t.flowers*0.05);
      t.soil.water = clamp(t.soil.water - 13*(1-p));
      if(t.crop) t.crop.growth = Math.max(0.05, t.crop.growth - 0.06*(1-p));
      if(p>0.4) prot++;
      recalc(t);
    });
    if(prot>0) lines.push(`💪 ${prot} tile${prot>1?'s':''} with spongy soil or a pond nearby held onto water!`);
    else lines.push('😟 The dry soil couldn\'t hold much water…');
    lesson='Soil full of organic matter soaks up rain like a sponge — and ponds share their water. Droughts can\'t beat a living farm.';
  }else if(id==='downpour'){
    bad=true; em='🌧️'; title='Heavy Rain!'; kid='A huge storm pounded the farm all night!';
    let bare=0, safe=0;
    soils.forEach(t=>{
      if(t.crop || t.soil.erosion>55 || treeAdj(t)){
        t.soil.water = clamp(t.soil.water+7); safe++;
      }else{
        t.soil.structure = clamp(t.soil.structure-5);
        t.soil.nutrients = clamp(t.soil.nutrients-4);
        t.soil.erosion   = clamp(t.soil.erosion-4);
        bare++;
      }
      recalc(t);
    });
    if(safe>0) lines.push(`🌿 ${safe} covered or tree-sheltered tile${safe>1?'s':''} drank the rain safely!`);
    if(bare>0) lines.push(`😟 ${bare} bare tile${bare>1?'s':''} lost some soil to the storm.`);
    // storms flush whatever the land can't hold straight into the river
    let buffers=0; state.grid.forEach(t2=>{ if(t2.terrain==='trees' && waterAdj(t2)) buffers++; });
    const wash = Math.max(0, (bare>0 ? 7 : 2) - buffers*2);
    if(wash>0){
      state.waterQuality = clamp(state.waterQuality - wash);
      lines.push('🟤 Muddy runoff washed into the river…');
    }else{
      lines.push('🌊 Your riverside buffers caught the runoff — the river stayed clean!');
    }
    lesson='Living roots, ground cover and hedgerows hold the soil tight when rain pounds down — and keep the mud out of the river.';
  }else if(id==='pests'){
    bad=true; em='🐛'; title='Pest Invasion!'; kid='Hungry bugs marched onto the farm!';
    let hit=0, safe=0;
    const guarded = f.bio>=45;
    soils.forEach(t=>{
      if(!t.crop) return;
      if(CROPS[t.crop.type].diverse || guarded) safe++;
      else{ t.crop.growth = Math.max(0.05, t.crop.growth-0.22); hit++; }
    });
    if(guarded) lines.push('🐞 Your ladybugs and birds gobbled the pests right up!');
    if(safe>0 && !guarded) lines.push(`🌽 ${safe} diverse tile${safe>1?'s':''} confused the bugs — no damage!`);
    if(hit>0) lines.push(`😟 ${hit} lonely crop${hit>1?'s':''} got munched…`);
    if(hit===0 && safe===0) lines.push('The bugs found nothing to eat and moved on!');
    lesson='A patchwork of different plants confuses pests — and wildlife eats them for free!';
  }else if(id==='duststorm'){
    bad=true; em='🌪️'; title='Dust Storm!'; kid='A wall of dust rolled off the dead flats and swallowed the sky!';
    let hit=0, safe=0;
    soils.forEach(t=>{
      if(t.crop || t.soil.erosion>50 || treeAdj(t)){ safe++; }
      else{
        t.soil.water = clamp(t.soil.water-6);
        t.soil.om = clamp(t.soil.om-3);
        t.soil.erosion = clamp(t.soil.erosion-3);
        hit++;
      }
      recalc(t);
    });
    if(safe>0) lines.push(`🌿 ${safe} covered tile${safe>1?'s':''} held tight against the wind!`);
    if(hit>0) lines.push(`😟 The storm scoured ${hit} bare tile${hit>1?'s':''}…`);
    lines.push('🏜️ Every DEAD tile you revive makes the storms weaker.');
    lesson='Bare, dead land feeds dust storms. Living roots and hedgerows pin the soil down — heal the land, calm the wind.';
  }else if(id==='gentleRain'){
    em='🌦️'; title='Gentle Rain'; kid='Soft rain fell for three cozy days.';
    soils.forEach(t=>{ t.soil.water = clamp(t.soil.water+8); recalc(t); });
    state.grid.forEach(t=>{   // rain even kisses the dead ground (it helps amendments work)
      if(t.terrain==='dead' && (t.compost>0 || t.crop)){ t.soil.water = clamp(t.soil.water+6); recalc(t); }
    });
    lines.push('💧 Every tile got a lovely drink.');
    lesson='Slow, gentle water is exactly what living soil loves best.';
  }else if(id==='sunny'){
    em='🌞'; title='Sunny Spell'; kid='A stretch of perfect sunshine!';
    let n=0;
    soils.forEach(t=>{ if(t.crop){ t.crop.growth = Math.min(0.99, t.crop.growth+0.12); n++; } });
    lines.push(n>0 ? `🌱 ${n} crop${n>1?'s':''} shot up in the sunshine!` : 'The open fields soaked up the warmth.');
    lesson='Sunshine is free energy — plants turn it into food for the whole soil web.';
  }else if(id==='gift'){
    em='🎁'; title='Neighborly Gift'; kid='A neighbor loved watching the farm come back — and left a gift!';
    state.coins += 10;
    lines.push('🪙 +10 coins! How kind!');
    lesson='Healthy farms inspire whole neighborhoods.';
  }else if(id==='beeVisit'){
    em='🐝'; title='Wandering Bees'; kid='A cloud of friendly bees buzzed through!';
    soils.forEach(t=>{ if(t.health>45) t.flowers = Math.min(1, t.flowers+0.1); });
    lines.push('🌼 They left extra wildflowers on your healthiest tiles.');
    lesson='Pollinators visit where flowers bloom — and help even more grow.';
  }else if(id==='snow'){
    em='☃️'; title='Snow Blanket'; kid='Thick fluffy snow tucked the whole farm in!';
    soils.forEach(t=>{ t.soil.water = clamp(t.soil.water+6); recalc(t); });
    lines.push('❄️ Melting snow means spring water for everyone.');
    lesson='Winter is not empty time — the soil rests and stores up for spring.';
  }else return;
  if(bad) SND.uhoh(); else SND.badge();
  showModal(`
    <h2>${em} ${title}</h2>
    <div class="eventbig">${em}</div>
    <div class="eventkid">${kid}</div>
    <div class="eventlines">${lines.map(l=>`<div>${l}</div>`).join('')}</div>
    <div class="lesson">🌱 ${lesson}</div>
    <div class="modalbtns"><button class="mbtn" data-act="close">OK!</button></div>
  `);
  checkBadges(); save(); updateHUD();
}
